  function customerList() {
    var s = {};
    (Store.raw().records.agreements || []).filter(function (r) { return r.companyId === cid(); }).forEach(function (r) { if (r.customer) s[r.customer] = r.unit; });
    (Store.raw().records.payments || []).filter(function (r) { return r.companyId === cid(); }).forEach(function (r) { if (r.customer && !s[r.customer]) s[r.customer] = r.unit; });
    (Store.raw().records.leads || []).filter(function (r) { return r.companyId === cid(); }).forEach(function (r) { if (r.name && !(r.name in s)) s[r.name] = ""; });

  function drawIssue(host) {
    var tpls = templates();
    var st = { tplId: tpls[0] && tpls[0].id, values: {} };

    function tpl() { return tpls.find(function (t) { return t.id === st.tplId; }); }

    function drawForm() {

      var tSel = U.el('<div class="field"><label>Template</label><select></select></div>');

      tSel.querySelector("select").onchange = function (e) { st.tplId = e.target.value; drawForm(); drawPreview(); };

      // recipient/customer with datalist autofill

      if (st.values.refNo == null) st.values.refNo = (co().name.split(" ")[0].toUpperCase()) + "/LT/" + new Date().getFullYear() + "/" + Math.floor(100 + Math.random() * 900);

      var fg = U.el('<div class="form-grid"></div>');

  function issue(tpl, values) {

      type: tpl.type, recipient: values.customer || values.bank || "—", unit: values.unit || "",

  function drawIssued(host) {

      tr.appendChild(U.el("<td>" + U.esc(r.recipient || "—") + "</td>"));
      tr.appendChild(U.el("<td>" + U.esc(r.unit || "—") + "</td>"));
      tr.appendChild(U.el("<td>" + U.esc(r.refNo || "—") + "</td>"));

      var act = U.el('<td class="num"><div class="row-actions"></div></td>'); var box = act.querySelector(".row-actions");
      var view = U.el('<button class="btn sm">View / Print</button>');

      var del = U.el('<button class="btn sm danger">×</button>'); del.onclick = function () { Store.remove("letters", r.id); drawIssued(host); };

    });

  function reprint(r) {
    var c = co();
    var head = '<div class="lh"><h1>' + U.esc(c.name) + '</h1><div class="sub">' + (c.gstin ? "GSTIN: " + U.esc(c.gstin) : "") + "</div></div>";

    w.document.write("<html><head><title>" + U.esc(r.type) + "</title><style>" + letterCSS() + "</style></head><body>" + html + "</body></html>");
    w.document.close(); w.focus(); setTimeout(function () { w.print(); }, 250);

  function drawTemplates(host) {
    host.appendChild(U.el('<div class="notice"><span class="ni">🧩</span><div>Edit a template body to match <b>your own draft</b>. Put merge fields in double braces, e.g. <code>{{customer}}</code>, <code>{{unit}}</code>, <code>{{amount}}</code>, <code>{{bank}}</code>. Auto-filled: <code>{{company}}</code>, <code>{{project}}</code>, <code>{{date}}</code>.</div></div>'));
    var addBtn = U.el('<button class="btn primary" style="margin-bottom:12px">+ New Template</button>');
    addBtn.onclick = function () { editTemplate(null, host); };
    host.appendChild(addBtn);
    var list = templates();
    var grid = U.el('<div class="cards grid-2"></div>');
    list.forEach(function (t) {
      var card = U.el('<div class="card"><div class="spread"><h3 style="margin:0">' + U.esc(t.name) + '</h3><span class="badge muted">' + U.esc(t.type || "") + "</span></div></div>");
      card.appendChild(U.el('<div class="muted" style="white-space:pre-wrap;font-size:12px;max-height:120px;overflow:hidden;margin:8px 0;border-left:3px solid var(--line);padding-left:10px">' + U.esc(t.body.slice(0, 240)) + "…</div>"));
      var b = U.el('<div class="row-flex"></div>');
      var ed = U.el('<button class="btn sm">Edit</button>'); ed.onclick = function () { editTemplate(t, host); };
      var del = U.el('<button class="btn sm danger">Delete</button>'); del.onclick = function () { U.confirmDialog("Delete template “" + t.name + "”?", function () { Store.remove("lettertemplates", t.id); drawTemplates(host); }, "Delete"); };
      b.appendChild(ed); b.appendChild(del); card.appendChild(b); grid.appendChild(card);
    });
    host.appendChild(grid);
  }
  function editTemplate(t, host) {
    var body = U.el("<div></div>");

    f.appendChild(U.el('<div class="field"><label>Template name</label><input id="t_name" value="' + U.esc(t ? t.name : "") + '"></div>'));
    f.appendChild(U.el('<div class="field"><label>Type</label><input id="t_type" value="' + U.esc(t ? t.type : "") + '" placeholder="e.g. Bank NOC"></div>'));

    body.appendChild(ta);

      if (t) data.id = t.id;
      Store.upsert("lettertemplates", data, "company"); U.Modal.close(); U.Toast.show("Template saved", "good"); drawTemplates(host);
    };
    foot.appendChild(cancel); foot.appendChild(save);
    U.Modal.open(t ? "Edit Template" : "New Template", body, foot);
  }

  global.Letters = { render: render };
})(window);

  <script>
/* AtriaERP — GSTIN / PAN verification (offline: format + official checksum)
 * Catches typos, fake, and structurally-invalid numbers instantly — no API, no key.
 * (A live government lookup of the registered legal name/address can be added later
 *  via a provider + a Supabase Edge Function.)
 */
(function (global) {
  "use strict";
  var U = global.UI;

  var STATE = {
    "01": "Jammu & Kashmir", "02": "Himachal Pradesh", "03": "Punjab", "04": "Chandigarh",
    "05": "Uttarakhand", "06": "Haryana", "07": "Delhi", "08": "Rajasthan", "09": "Uttar Pradesh",
    "10": "Bihar", "11": "Sikkim", "12": "Arunachal Pradesh", "13": "Nagaland", "14": "Manipur",
    "15": "Mizoram", "16": "Tripura", "17": "Meghalaya", "18": "Assam", "19": "West Bengal",
    "20": "Jharkhand", "21": "Odisha", "22": "Chhattisgarh", "23": "Madhya Pradesh", "24": "Gujarat",
    "25": "Daman & Diu", "26": "Dadra & Nagar Haveli", "27": "Maharashtra", "28": "Andhra Pradesh (old)",
    "29": "Karnataka", "30": "Goa", "31": "Lakshadweep", "32": "Kerala", "33": "Tamil Nadu",
    "34": "Puducherry", "35": "Andaman & Nicobar", "36": "Telangana", "37": "Andhra Pradesh",
    "38": "Ladakh", "97": "Other Territory", "99": "Centre Jurisdiction"
  };
  var PAN_TYPE = {
    P: "Individual", C: "Company", H: "HUF", F: "Firm / LLP", A: "Association of Persons (AOP)",
    T: "Trust", B: "Body of Individuals", L: "Local Authority", J: "Artificial Juridical Person", G: "Government"
  };

  function gstinCheckDigit(g14) {
    var code = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ", factor = 2, sum = 0, mod = 36;
    for (var i = g14.length - 1; i >= 0; i--) {
      var cp = code.indexOf(g14.charAt(i));
      if (cp < 0) return "";
      var digit = factor * cp;
      factor = factor === 2 ? 1 : 2;
      digit = Math.floor(digit / mod) + (digit % mod);
      sum += digit;
    }
    return code.charAt((mod - (sum % mod)) % mod);
  }

  function gstin(value) {
    var g = String(value || "").toUpperCase().replace(/\s/g, "");
    if (!g) return { ok: false, message: "Enter a GSTIN" };
    if (g.length !== 15) return { ok: false, message: "GSTIN must be 15 characters (got " + g.length + ")" };
    if (!/^[0-9]{2}[A-Z]{5}[0-9]{4}[A-Z][1-9A-Z]Z[0-9A-Z]$/.test(g)) return { ok: false, message: "Invalid GSTIN format" };
    var state = g.slice(0, 2);
    if (!STATE[state]) return { ok: false, message: "Invalid state code (" + state + ")" };
    if (gstinCheckDigit(g.slice(0, 14)) !== g.charAt(14)) return { ok: false, message: "Checksum failed — number is invalid or mistyped" };
    return { ok: true, value: g, message: "Valid GSTIN", details: { State: STATE[state], "PAN inside": g.slice(2, 12), "Reg. number": g.charAt(12) } };
  }

  function pan(value) {
    var p = String(value || "").toUpperCase().replace(/\s/g, "");
    if (!p) return { ok: false, message: "Enter a PAN" };
    if (p.length !== 10) return { ok: false, message: "PAN must be 10 characters (got " + p.length + ")" };
    if (!/^[A-Z]{5}[0-9]{4}[A-Z]$/.test(p)) return { ok: false, message: "Invalid PAN format (expected AAAAA9999A)" };
    var t = PAN_TYPE[p.charAt(3)] || "Unknown type";
    return { ok: true, value: p, message: "Valid PAN format", details: { "Holder type": t } };
  }

  function check(type, value) { return type === "PAN" ? pan(value) : gstin(value); }

/* AtriaERP — CSV/Excel import & export (works for any module)
 * Download a template, fill it in Excel, upload it back, auto-map columns, bulk-create.
 */
(function (global) {
  "use strict";
  var U = global.UI;

  function csvCell(v) { v = v == null ? "" : String(v); return /[",\n\r]/.test(v) ? '"' + v.replace(/"/g, '""') + '"' : v; }
  function toCSV(rows, fields) {
    var lines = [fields.map(function (f) { return csvCell(f.label); }).join(",")];
    rows.forEach(function (r) { lines.push(fields.map(function (f) { return csvCell(r[f.f]); }).join(",")); });
    return lines.join("\r\n");
  }
  function parseCSV(text) {
    var rows = [], row = [], cur = "", inQ = false;
    text = text.replace(/\r\n/g, "\n").replace(/\r/g, "\n");
    for (var i = 0; i < text.length; i++) {
      var c = text[i];
      if (inQ) {
        if (c === '"') { if (text[i + 1] === '"') { cur += '"'; i++; } else inQ = false; }
        else cur += c;
      } else {
        if (c === '"') inQ = true;
        else if (c === ",") { row.push(cur); cur = ""; }
        else if (c === "\n") { row.push(cur); rows.push(row); row = []; cur = ""; }
        else cur += c;
      }
    }
    if (cur !== "" || row.length) { row.push(cur); rows.push(row); }
    // drop fully-empty trailing rows
    return rows.filter(function (r) { return r.some(function (c) { return String(c).trim() !== ""; }); });
  }

  function download(name, text, mime) {
    var blob = new Blob([text], { type: mime || "text/csv;charset=utf-8" });
    var a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = name; a.click();
  }

  function exportEntity(entityKey) {
    var def = Schema.ENTITIES[entityKey];
    var rows = Store.list(entityKey, { scope: def.scope });
    download(entityKey + "-export-" + Store.todayISO() + ".csv", toCSV(rows, def.fields), "text/csv");
    U.Toast.show("Exported " + rows.length + " " + def.title.toLowerCase(), "good");
  }

  function downloadTemplate(entityKey) {
    var def = Schema.ENTITIES[entityKey];
    // include one example row of hints
    var hint = {}; def.fields.forEach(function (f) {
      hint[f.f] = f.type === "select" ? (f.options || []).slice(0, 1)[0] || "" : f.type === "date" ? "2026-06-30" : f.type === "money" || f.type === "number" ? "0" : "";
    });
    download(entityKey + "-template.csv", toCSV([hint], def.fields), "text/csv");
    U.Toast.show("Template downloaded — fill it in Excel, then Import", "good");
  }

  function norm(s) { return String(s || "").toLowerCase().replace(/[^a-z0-9]/g, ""); }

  function openImport(entityKey, onDone) {
    var def = Schema.ENTITIES[entityKey];
    var body = U.el("<div></div>");
    body.appendChild(U.el('<div class="notice"><span class="ni">📄</span><div>1) <b>Download the template</b>, fill your rows in Excel, and <b>Save As CSV</b>. 2) <b>Upload</b> it below. Columns are matched by their heading.</div></div>'));
    var dl = U.el('<button class="btn" style="margin-bottom:12px">⬇ Download template CSV</button>');
    dl.onclick = function () { downloadTemplate(entityKey); };
    body.appendChild(dl);
    var file = U.el('<input type="file" accept=".csv,text/csv" style="display:block;margin-bottom:10px">');
    body.appendChild(file);
    var out = U.el("<div></div>"); body.appendChild(out);
    var parsed = null;

    file.onchange = function (e) {
      var f = e.target.files[0]; if (!f) return;
      var reader = new FileReader();
      reader.onload = function () {
        out.innerHTML = "";
        try {
          var grid = parseCSV(reader.result);
          if (grid.length < 2) { out.appendChild(U.el('<div class="notice warn"><span class="ni">⚠️</span><div>No data rows found.</div></div>')); return; }
          var headers = grid[0];
          // map each CSV header to a field by label or key
          var map = headers.map(function (h) {
            var hit = def.fields.find(function (fl) { return norm(fl.label) === norm(h) || norm(fl.f) === norm(h); });
            return hit ? hit.f : null;
          });
          var mappedCount = map.filter(Boolean).length;
          var dataRows = grid.slice(1);
          parsed = { headers: headers, map: map, rows: dataRows };
          out.appendChild(U.el('<div class="stat-line"><span>Rows found</span><b>' + dataRows.length + "</b></div>"));
          out.appendChild(U.el('<div class="stat-line"><span>Columns matched</span><b>' + mappedCount + " / " + headers.length + "</b></div>"));
          var unmapped = headers.filter(function (h, i) { return !map[i]; });
          if (unmapped.length) out.appendChild(U.el('<div class="muted" style="font-size:12px;margin-top:6px">Ignored columns: ' + U.esc(unmapped.join(", ")) + "</div>"));
          if (!mappedCount) out.appendChild(U.el('<div class="notice warn" style="margin-top:8px"><span class="ni">⚠️</span><div>No columns matched — use the template headings.</div></div>'));
        } catch (err) { out.appendChild(U.el('<div class="notice warn"><span class="ni">⚠️</span><div>Could not read file: ' + U.esc(err.message) + "</div></div>")); }

    };

    var foot = U.el('<div class="row-flex"></div>');
    var cancel = U.el('<button class="btn">Cancel</button>'); cancel.onclick = U.Modal.close;
    var imp = U.el('<button class="btn primary">Import</button>');
    imp.onclick = function () {
      if (!parsed) { U.Toast.show("Choose a CSV file first", "bad"); return; }
      var n = 0;
      parsed.rows.forEach(function (cells) {
        var data = {}, has = false;
        parsed.map.forEach(function (fkey, i) {
          if (!fkey) return;
          var fld = def.fields.find(function (x) { return x.f === fkey; });
          var v = cells[i]; if (v == null) v = "";
          v = String(v).trim();
          if (v === "") return;
          if (fld && (fld.type === "money" || fld.type === "number" || fld.type === "percent")) { var num = Number(v.replace(/[, ]/g, "")); v = isNaN(num) ? v : num; }
          data[fkey] = v; has = true;

      U.Toast.show("Imported " + n + " " + def.title.toLowerCase(), "good");

    U.Modal.open("Import " + def.title, body, foot);

    document.getElementById("backupBtn").onclick = function () { route("datamanager"); };
    var gs = document.getElementById("globalSearch");
    gs.addEventListener("keydown", function (e) { if (e.key === "Enter") globalSearch(gs.value); });

    if (window.innerWidth < 900) document.getElementById("app").classList.add("nav-collapsed");

    if (global.Feedback) Feedback.mount();
  }

  function setupUserChip() {
    var cloud = global.Cloud && Cloud.enabled && Cloud.enabled();
    var nameEl = document.getElementById("userName");
    var chip = document.querySelector(".user-chip");
    if (cloud) {
      var u = Cloud.currentUser() || {};
      if (nameEl) nameEl.textContent = (u.full_name || u.email || "User").split("@")[0];
      var roleEl = chip && chip.querySelector(".user-meta small"); if (roleEl) roleEl.textContent = (u.role || "user").replace(/^./, function (c) { return c.toUpperCase(); });
      var av = chip && chip.querySelector(".avatar"); if (av) av.textContent = ((u.full_name || u.email || "U")[0] || "U").toUpperCase();
      if (chip) { chip.style.cursor = "pointer"; chip.title = "Click to sign out"; chip.onclick = function () { if (confirm("Sign out of AtriaERP?")) Auth.logout(); }; }
    }
  }

  function refreshFromCloud() {
    if (!(global.Cloud && Cloud.enabled && Cloud.enabled())) return;
    Cloud.loadAll().then(function (data) {
      Store.hydrateFromCloud(data); buildContextSelectors(); buildNav(); route(current);
    }).catch(function (e) { console.warn("Refresh failed:", e.message); });
  }

  function boot() {
    var cloud = global.Cloud && Cloud.enabled && Cloud.enabled();
    if (!cloud) {
      Store.load();
      if (!Store.hasData()) Store.setRaw(Seed.buildSeed());
      startUI();
      return;
    }
    // Cloud mode: require login, then load shared data
    var go = function () {
      Cloud.loadAll().then(function (data) {
        Store.hydrateFromCloud(data);
        startUI();
        var secs = (global.AtriaConfig && AtriaConfig.POLL_SECONDS) || 30;
        if (secs > 0) setInterval(refreshFromCloud, secs * 1000);
      }).catch(function (e) {
        document.getElementById("content").innerHTML = '<div class="notice warn" style="margin:30px"><span class="ni">⚠️</span><div><b>Could not load cloud data.</b> ' + U.esc(e.message) + '<br>Check that the database tables were created (cloud/supabase-setup.sql).</div></div>';
      });
    };
    var session = Cloud.restoreSession();
    if (session && session.access_token) {
      Cloud.loadProfile().then(go).catch(go);
    } else {
      Auth.showLogin(go);
    }
  }

  global.App = { route: route, refreshContext: refreshContext, refreshFromCloud: refreshFromCloud, boot: boot };
  document.addEventListener("DOMContentLoaded", boot);
})(window);

</script>

  <!-- Beta: no service worker. Actively clean up any old one that may be serving a stale cache. -->
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (rs) {
        rs.forEach(function (r) { r.unregister(); });
      }).catch(function () {});
      if (window.caches) { caches.keys().then(function (ks) { ks.forEach(function (k) { caches.delete(k); }); }).catch(function () {}); }
    }
  </script>
</body>
</html>
