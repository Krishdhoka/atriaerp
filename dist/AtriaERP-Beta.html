<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AtriaERP — Real Estate ERP</title>
  <style>
:root {
  --bg: #0f1729;
  --bg-2: #131d34;
  --panel: #ffffff;
  --panel-2: #f6f8fc;
  --ink: #0f1729;
  --ink-2: #475069;
  --muted: #8a93a6;
  --line: #e4e8f0;
  --brand: #1f6feb;
  --brand-2: #1450b4;
  --accent: #14b8a6;
  --good: #16a34a;
  --warn: #d97706;
  --bad: #dc2626;
  --good-bg: #e7f6ec;
  --warn-bg: #fdf1e0;
  --bad-bg: #fbe9e9;
  --info-bg: #e8f0fe;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 1px 3px rgba(16,24,40,.08), 0 1px 2px rgba(16,24,40,.04);
  --shadow-lg: 0 12px 32px rgba(16,24,40,.18);
  --sidebar-w: 256px;
  --topbar-h: 60px;
  font-family: "Segoe UI", system-ui, -apple-system, Roboto, Helvetica, Arial, sans-serif;
}

* { box-sizing: border-box; }
[hidden] { display: none !important; }   /* the hidden attribute must always win over any display rule */
html, body { margin: 0; height: 100%; }
body { background: var(--panel-2); color: var(--ink); font-size: 14px; }
a { color: var(--brand); text-decoration: none; }
button { font-family: inherit; }

#app {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  grid-template-rows: var(--topbar-h) 1fr;
  grid-template-areas: "topbar topbar" "sidebar content";
  height: 100vh;
}
#app.nav-collapsed { grid-template-columns: 0 1fr; }
#app.nav-collapsed .sidebar { transform: translateX(-100%); }

/* Topbar */
.topbar {
  grid-area: topbar;
  background: var(--bg);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  gap: 16px;
  z-index: 30;
}
.topbar-left, .topbar-center, .topbar-right { display: flex; align-items: center; gap: 14px; }
.brand { display: flex; align-items: center; gap: 10px; }
.brand-mark {
  width: 34px; height: 34px; border-radius: 9px;
  background: linear-gradient(135deg, var(--brand), var(--accent));
  display: grid; place-items: center; font-weight: 800; font-size: 18px;
}
.brand-text { display: flex; flex-direction: column; line-height: 1.1; }
.brand-text small { color: #9fb0c9; font-size: 11px; }

.icon-btn {
  background: transparent; color: #cdd6e6; border: 0; font-size: 18px;
  width: 38px; height: 38px; border-radius: 8px; cursor: pointer;
}
.icon-btn:hover { background: rgba(255,255,255,.08); color: #fff; }

.ctx-select { display: flex; flex-direction: column; line-height: 1; }
.ctx-select span { font-size: 10px; text-transform: uppercase; letter-spacing: .5px; color: #8fa1bd; margin-bottom: 3px; }
.ctx-select select {
  background: var(--bg-2); color: #fff; border: 1px solid #2a3a5a;
  border-radius: 8px; padding: 7px 10px; min-width: 190px; font-size: 13px;
}
.global-search input {
  background: var(--bg-2); color: #fff; border: 1px solid #2a3a5a;
  border-radius: 999px; padding: 8px 14px; width: 220px; font-size: 13px;
}
.global-search input::placeholder { color: #7e90ad; }

.user-chip { display: flex; align-items: center; gap: 8px; }
.avatar {
  width: 34px; height: 34px; border-radius: 50%; background: var(--accent);
  display: grid; place-items: center; font-weight: 700; font-size: 13px; color: #04201c;
}
.user-meta { display: flex; flex-direction: column; line-height: 1.15; }
.user-meta small { color: #9fb0c9; font-size: 11px; }

/* Sidebar */
.sidebar {
  grid-area: sidebar;
  background: var(--bg-2);
  color: #cbd5e7;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  transition: transform .2s ease;
  z-index: 20;
}
.sidebar nav { padding: 10px 8px; }
.nav-group-title {
  font-size: 10.5px; text-transform: uppercase; letter-spacing: .7px;
  color: #6f82a3; padding: 14px 12px 6px;
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px; border-radius: 8px; cursor: pointer;
  color: #c2cee2; font-size: 13.5px; margin: 1px 0;
}
.nav-item:hover { background: rgba(255,255,255,.06); color: #fff; }
.nav-item.active { background: var(--brand); color: #fff; }
.nav-item .ni-icon { width: 18px; text-align: center; opacity: .9; }
.nav-item .ni-badge {
  margin-left: auto; background: rgba(255,255,255,.14); color: #fff;
  border-radius: 999px; font-size: 10px; padding: 1px 7px;
}
.nav-item.active .ni-badge { background: rgba(255,255,255,.25); }
.sidebar-footer { padding: 12px 16px; border-top: 1px solid #22304d; font-size: 11px; color: #7e90ad; }
.env-pill { display: flex; align-items: center; gap: 7px; margin-bottom: 4px; color: #b6c2d8; }
.env-pill .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--good); box-shadow: 0 0 0 3px rgba(22,163,74,.2); }

/* Content */
.content { grid-area: content; overflow-y: auto; padding: 22px 26px 60px; }
.page-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 18px; flex-wrap: wrap; }
.page-head h1 { font-size: 22px; margin: 0 0 3px; }
.page-head .sub { color: var(--ink-2); font-size: 13px; }
.breadcrumb { color: var(--muted); font-size: 12px; margin-bottom: 6px; }

/* Buttons */
.btn {
  display: inline-flex; align-items: center; gap: 7px;
  border: 1px solid var(--line); background: #fff; color: var(--ink);
  padding: 8px 14px; border-radius: var(--radius-sm); cursor: pointer; font-size: 13px; font-weight: 600;
}
.btn:hover { background: var(--panel-2); }
.btn.primary { background: var(--brand); border-color: var(--brand); color: #fff; }
.btn.primary:hover { background: var(--brand-2); }
.btn.danger { color: var(--bad); border-color: #f2c7c7; }
.btn.danger:hover { background: var(--bad-bg); }
.btn.ghost { border-color: transparent; background: transparent; }
.btn.sm { padding: 5px 10px; font-size: 12px; }

/* Cards & grid */
.cards { display: grid; gap: 16px; }
.grid-4 { grid-template-columns: repeat(4, 1fr); }
.grid-3 { grid-template-columns: repeat(3, 1fr); }
.grid-2 { grid-template-columns: repeat(2, 1fr); }
@media (max-width: 1100px){ .grid-4{grid-template-columns:repeat(2,1fr)} .grid-3{grid-template-columns:repeat(2,1fr)} }
@media (max-width: 720px){ .grid-4,.grid-3,.grid-2{grid-template-columns:1fr} }

.card {
  background: var(--panel); border: 1px solid var(--line);
  border-radius: var(--radius); box-shadow: var(--shadow); padding: 16px;
}
.card h3 { margin: 0 0 12px; font-size: 15px; }
.card-section-head { display:flex; align-items:center; justify-content:space-between; margin-bottom: 12px; }
.card-section-head h3 { margin: 0; }

.clickable-card { cursor: pointer; transition: box-shadow .12s, border-color .12s, transform .12s; }
.clickable-card:hover { border-color: var(--brand); box-shadow: 0 6px 18px rgba(31,111,235,.16); transform: translateY(-1px); }
.kpi { position: relative; overflow: hidden; }
.kpi .kpi-label { color: var(--ink-2); font-size: 12.5px; }
.kpi .kpi-value { font-size: 26px; font-weight: 800; margin: 6px 0 2px; letter-spacing: -.5px; }
.kpi .kpi-sub { font-size: 12px; color: var(--muted); }
.kpi .kpi-icon {
  position: absolute; right: 14px; top: 14px; width: 40px; height: 40px;
  border-radius: 10px; display: grid; place-items: center; font-size: 18px; background: var(--info-bg);
}
.trend.up { color: var(--good); } .trend.down { color: var(--bad); }

/* Tables */
.toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
.toolbar .search { flex: 1; min-width: 180px; }
.toolbar input[type=search], .toolbar select, .filter-input {
  border: 1px solid var(--line); border-radius: var(--radius-sm); padding: 8px 12px; font-size: 13px; background: #fff;
}
.toolbar .search input { width: 100%; }

.table-wrap { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
table.data { width: 100%; border-collapse: collapse; }
table.data th, table.data td { text-align: left; padding: 11px 14px; font-size: 13px; border-bottom: 1px solid var(--line); }
table.data th { background: var(--panel-2); color: var(--ink-2); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: .3px; white-space: nowrap; cursor: pointer; user-select: none; }
table.data tbody tr:hover { background: #f9fbff; }
table.data td.num, table.data th.num { text-align: right; font-variant-numeric: tabular-nums; }
table.data tr:last-child td { border-bottom: 0; }
.row-actions { display: flex; gap: 4px; justify-content: flex-end; }
.empty-state { padding: 50px 20px; text-align: center; color: var(--muted); }
.empty-state .big { font-size: 40px; margin-bottom: 8px; }

/* Badges */
.badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px; border-radius: 999px; font-size: 11.5px; font-weight: 600; }
.badge.good { background: var(--good-bg); color: var(--good); }
.badge.warn { background: var(--warn-bg); color: var(--warn); }
.badge.bad { background: var(--bad-bg); color: var(--bad); }
.badge.info { background: var(--info-bg); color: var(--brand); }
.badge.muted { background: #eef1f6; color: var(--ink-2); }

/* Forms / modal */
.modal-backdrop { position: fixed; inset: 0; background: rgba(15,23,41,.55); display: grid; place-items: center; z-index: 50; padding: 20px; }
.modal { background: #fff; border-radius: var(--radius); box-shadow: var(--shadow-lg); width: min(720px, 100%); max-height: 90vh; overflow: hidden; display: flex; flex-direction: column; }
.modal-head { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--line); }
.modal-head h2 { margin: 0; font-size: 17px; }
.modal-body { padding: 18px 20px; overflow-y: auto; }
.modal-foot { padding: 14px 20px; border-top: 1px solid var(--line); display: flex; justify-content: flex-end; gap: 10px; background: var(--panel-2); }

.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-grid .full { grid-column: 1 / -1; }
.field label { display: block; font-size: 12.5px; color: var(--ink-2); margin-bottom: 5px; font-weight: 600; }
.field input, .field select, .field textarea {
  width: 100%; border: 1px solid var(--line); border-radius: var(--radius-sm); padding: 9px 11px; font-size: 13.5px; font-family: inherit; background: #fff;
}
.field input:focus, .field select:focus, .field textarea:focus { outline: 2px solid rgba(31,111,235,.25); border-color: var(--brand); }
.field textarea { min-height: 78px; resize: vertical; }
.field .hint { font-size: 11px; color: var(--muted); margin-top: 4px; }
.field.req label::after { content: " *"; color: var(--bad); }

/* Toasts */
.toast-host { position: fixed; right: 18px; bottom: 18px; display: flex; flex-direction: column; gap: 10px; z-index: 60; }
.toast { background: var(--ink); color: #fff; padding: 11px 16px; border-radius: 10px; box-shadow: var(--shadow-lg); font-size: 13px; display: flex; gap: 9px; align-items: center; animation: slideIn .2s ease; }
.toast.good { background: var(--good); } .toast.bad { background: var(--bad); }
@keyframes slideIn { from { transform: translateY(8px); opacity: 0; } to { transform: none; opacity: 1; } }

/* Misc helpers */
.muted { color: var(--muted); }
.row-flex { display: flex; align-items: center; gap: 10px; }
.spread { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.tag-list { display: flex; flex-wrap: wrap; gap: 6px; }
.pill { background: var(--panel-2); border: 1px solid var(--line); border-radius: 999px; padding: 3px 10px; font-size: 12px; }
.progress { height: 8px; border-radius: 999px; background: #e9edf4; overflow: hidden; }
.progress > span { display: block; height: 100%; background: var(--brand); }
hr.sep { border: 0; border-top: 1px solid var(--line); margin: 16px 0; }

.notice {
  display: flex; gap: 12px; align-items: flex-start; padding: 13px 15px; border-radius: var(--radius-sm);
  background: var(--info-bg); border: 1px solid #cfe0fb; font-size: 13px; color: var(--ink-2); margin-bottom: 16px;
}
.notice .ni { font-size: 18px; }
.notice.warn { background: var(--warn-bg); border-color: #f3dcb4; }

.list-plain { list-style: none; margin: 0; padding: 0; }
.list-plain li { padding: 10px 0; border-bottom: 1px solid var(--line); display: flex; gap: 12px; align-items: flex-start; }
.list-plain li:last-child { border-bottom: 0; }
.dotmark { width: 9px; height: 9px; border-radius: 50%; margin-top: 5px; flex: none; background: var(--brand); }

.stat-line { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 1px dashed var(--line); font-size: 13px; }
.stat-line:last-child { border-bottom: 0; }
.stat-line b { font-variant-numeric: tabular-nums; }

.timeline { position: relative; padding-left: 20px; }
.timeline::before { content:""; position:absolute; left: 5px; top: 4px; bottom: 4px; width: 2px; background: var(--line); }
.timeline .tl-item { position: relative; padding: 0 0 16px 4px; }
.timeline .tl-item::before { content:""; position:absolute; left: -19px; top: 4px; width: 10px; height: 10px; border-radius: 50%; background: var(--brand); border: 2px solid #fff; }
.timeline small { color: var(--muted); }

.seg { display: inline-flex; border: 1px solid var(--line); border-radius: 999px; overflow: hidden; }
.seg button { border: 0; background: #fff; padding: 6px 14px; font-size: 12.5px; cursor: pointer; color: var(--ink-2); }
.seg button.active { background: var(--brand); color: #fff; }

.bar-row { display: flex; align-items: center; gap: 10px; margin: 9px 0; font-size: 13px; }
.bar-row .bar-label { width: 130px; color: var(--ink-2); }
.bar-row .bar-track { flex: 1; height: 18px; background: var(--panel-2); border-radius: 6px; overflow: hidden; }
.bar-row .bar-fill { height: 100%; background: linear-gradient(90deg,var(--brand),var(--accent)); }
.bar-row .bar-val { width: 90px; text-align: right; font-variant-numeric: tabular-nums; }

/* Collections — party cards (Khatabook style) */
.party-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
@media (max-width: 820px){ .party-grid { grid-template-columns: 1fr; } }
.party-card { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); padding: 14px; }
.party-top { display: flex; align-items: center; gap: 12px; }
.party-avatar { width: 42px; height: 42px; border-radius: 50%; background: linear-gradient(135deg,var(--brand),var(--accent)); color: #fff; display: grid; place-items: center; font-weight: 700; font-size: 15px; flex: none; }
.party-meta { flex: 1; min-width: 0; }
.party-name { font-weight: 700; font-size: 14.5px; }
.party-sub { color: var(--muted); font-size: 12px; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.party-amt { text-align: right; flex: none; }
.party-amt .amt { font-size: 18px; font-weight: 800; font-variant-numeric: tabular-nums; }
.party-amt.get .amt { color: var(--good); }
.party-amt.give .amt { color: var(--bad); }
.party-amt .amt-lbl { font-size: 10.5px; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; }
.party-aging { font-size: 12px; color: var(--ink-2); margin: 10px 0; padding: 6px 10px; background: var(--panel-2); border-radius: 7px; }
.party-aging.bad { background: var(--bad-bg); color: var(--bad); font-weight: 600; }
.party-card .row-flex { margin-top: 10px; }
.party-card a.btn { text-decoration: none; }

/* ---------- Beta badge + feedback button ---------- */
.beta-badge { background: #f59e0b; color: #3a2400; font-size: 9px; font-weight: 800; padding: 1px 5px; border-radius: 4px; vertical-align: middle; letter-spacing: .5px; margin-left: 4px; }
.fb-fab {
  position: fixed; right: 18px; bottom: 18px; z-index: 45;
  background: var(--ink); color: #fff; border: 0; border-radius: 999px;
  padding: 11px 16px; font-size: 13px; font-weight: 700; cursor: pointer; box-shadow: var(--shadow-lg);
}
.fb-fab:hover { background: #000; }
@media print { .fb-fab { display: none; } }

/* ---------- Print (reports) ---------- */
@media print {
  .topbar, .sidebar, .toolbar, .seg, .modal-backdrop, .toast-host { display: none !important; }
  #app { display: block; height: auto; }
  .content { overflow: visible; padding: 0; }
  .table-wrap { box-shadow: none; border-color: #ccc; }
  table.data th { background: #eee !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  body { background: #fff; }
  @page { margin: 14mm; }
}

/* ---------- Auth / login screen ---------- */
.auth-screen { position: fixed; inset: 0; z-index: 100; display: grid; place-items: center; padding: 20px;
  background: radial-gradient(1200px 600px at 50% -10%, #1b2a4a, #0f1729); }
.auth-screen[hidden] { display: none; }   /* the hidden attribute must win over display:grid */
.auth-card { width: min(400px, 100%); background: #fff; border-radius: 16px; box-shadow: var(--shadow-lg); padding: 28px 26px; }
.auth-brand { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
.auth-brand .brand-mark { width: 44px; height: 44px; font-size: 22px; }
.auth-brand strong { font-size: 18px; } .auth-brand small { color: var(--muted); }
.auth-card h2 { margin: 6px 0 2px; font-size: 20px; }
.auth-card .field { margin-bottom: 14px; }
.auth-err { background: var(--bad-bg); color: var(--bad); border-radius: 8px; padding: 9px 12px; font-size: 12.5px; margin-bottom: 12px; }
.auth-foot { text-align: center; font-size: 11.5px; margin-top: 16px; }

/* ---------- Mobile / phone (PWA) ---------- */
@media (max-width: 860px) {
  :root { --topbar-h: 56px; }
  #app { grid-template-columns: 1fr; grid-template-areas: "topbar" "content"; }
  /* Sidebar becomes an overlay drawer */
  .sidebar { position: fixed; top: var(--topbar-h); left: 0; bottom: 0; width: 270px; box-shadow: var(--shadow-lg); }
  #app:not(.nav-collapsed) .sidebar { transform: none; }
  #app.nav-collapsed .sidebar { transform: translateX(-100%); }
  #app.nav-collapsed { grid-template-columns: 1fr; }

  .topbar { flex-wrap: wrap; gap: 8px; padding: 0 10px; }
  .brand-text small { display: none; }
  .topbar-center { order: 3; width: 100%; gap: 8px; padding-bottom: 8px; }
  .topbar-center .ctx-select { flex: 1; }
  .ctx-select select { min-width: 0; width: 100%; }
  .global-search { display: none; }
  .topbar-right { gap: 6px; }
  .user-meta { display: none; }

  .content { padding: 14px 12px 80px; }
  .page-head h1 { font-size: 19px; }
  table.data th, table.data td { padding: 9px 10px; }
  .modal { width: 100%; max-height: 94vh; }
  .form-grid { grid-template-columns: 1fr; }
  .grid-4, .grid-3, .grid-2 { grid-template-columns: 1fr; }
  /* larger touch targets */
  .nav-item { padding: 12px 14px; font-size: 15px; }
  .btn { padding: 10px 14px; }
  .btn.sm { padding: 7px 11px; }
}
/* When topbar wraps on mobile, allow it to grow */
@media (max-width: 860px) { .topbar { height: auto; min-height: var(--topbar-h); } #app { grid-template-rows: auto 1fr; } }

</style>
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#0f1729" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="AtriaERP" />
  <link rel="apple-touch-icon" href="assets/icons/icon.svg" />
  <link rel="icon" href="assets/icons/icon.svg" />
  <script>
    // Make any startup error visible on screen instead of a blank page.
    window.addEventListener("error", function (e) {
      try {
        var d = document.getElementById("bootError");
        if (!d) {
          d = document.createElement("div"); d.id = "bootError";
          d.style.cssText = "position:fixed;left:0;right:0;top:0;z-index:99999;background:#dc2626;color:#fff;padding:12px 16px;font:13px/1.5 Segoe UI,sans-serif;white-space:pre-wrap";
          (document.body || document.documentElement).appendChild(d);
        }
        var f = (e.filename || "").split("/").pop();
        d.textContent = "AtriaERP startup error:\n" + (e.message || e) + (f ? ("\nin " + f + ":" + (e.lineno || "")) : "") + "\n\nTip: hard-refresh with Ctrl+Shift+R.";
      } catch (x) {}
    });
  </script>
</head>
<body>
  <!-- Login screen (cloud mode only) -->
  <div id="authScreen" class="auth-screen" hidden></div>

  <div id="app">
    <!-- Top bar -->
    <header class="topbar">
      <div class="topbar-left">
        <button id="navToggle" class="icon-btn" title="Toggle menu">&#9776;</button>
        <div class="brand">
          <span class="brand-mark">A</span>
          <div class="brand-text">
            <strong>AtriaERP <span class="beta-badge">BETA</span></strong>
            <small>Real Estate ERP</small>
          </div>
        </div>
      </div>

      <div class="topbar-center">
        <label class="ctx-select">
          <span>Company</span>
          <select id="companySelect"></select>
        </label>
        <label class="ctx-select">
          <span>Project</span>
          <select id="projectSelect"></select>
        </label>
      </div>

      <div class="topbar-right">
        <div class="global-search">
          <input id="globalSearch" type="search" placeholder="Search anything…" autocomplete="off" />

/* AtriaERP — Cloud backend (Supabase via REST, no SDK)
 * Talks to Supabase Auth + PostgREST with plain fetch so the app stays build-free.
 *
 * Data model in Supabase (see cloud/supabase-setup.sql):
 *   companies(id text pk, data jsonb)
 *   projects (id text pk, company_id text, data jsonb)
 *   records  (id text pk, entity text, company_id text, project_id text, data jsonb, updated_at)
 *   profiles (id uuid pk = auth user, email text, role text, full_name text)

(function (global) {
  "use strict";

    return fetch(base() + "/auth/v1/token?grant_type=password", {

      body: JSON.stringify({ email: email, password: password })
    }).then(function (r) { return r.json().then(function (j) { return { ok: r.ok, j: j }; }); })
      .then(function (res) {
        if (!res.ok) throw new Error(res.j.error_description || res.j.msg || res.j.error || "Login failed");
        session = { access_token: res.j.access_token, refresh_token: res.j.refresh_token, user: res.j.user };
        persistSession();
        return loadProfile().then(function () { return session; });
      });
  }

  function loadProfile() {
    return fetch(base() + "/rest/v1/profiles?id=eq." + session.user.id + "&select=*", { headers: authHeaders() })
      .then(function (r) { return r.ok ? r.json() : []; })
      .then(function (rows) {
        session.profile = (rows && rows[0]) || { id: session.user.id, email: session.user.email, role: "admin", full_name: session.user.email };
      }).catch(function () { session.profile = { role: "admin", email: session.user.email, full_name: session.user.email }; });
  }

  function persistSession() { try { localStorage.setItem("atriaerp.session", JSON.stringify(session)); } catch (e) {} }
  function restoreSession() {
    try { var raw = localStorage.getItem("atriaerp.session"); if (raw) { session = JSON.parse(raw); return session; } } catch (e) {}
    return null;
  }
  function signOut() { session = null; try { localStorage.removeItem("atriaerp.session"); } catch (e) {} }
  function currentUser() { return session ? session.profile : null; }

  /* ---------- data ---------- */
  function selectAll(table) {
    return fetch(base() + "/rest/v1/" + table + "?select=*", { headers: authHeaders() })
      .then(function (r) { if (!r.ok) return r.json().then(function (j) { throw new Error(j.message || ("Load " + table + " failed")); }); return r.json(); });
  }

  // Pull everything into the in-memory DB shape used by Store
  function loadAll() {
    return Promise.all([selectAll("companies"), selectAll("projects"), selectAll("records")])
      .then(function (res) {
        var companies = res[0].map(function (r) { return r.data; });
        var projects = res[1].map(function (r) { return r.data; });
        var records = {};
        res[2].forEach(function (r) { (records[r.entity] = records[r.entity] || []).push(r.data); });
        return { companies: companies, projects: projects, records: records };

  function upsert(table, body) {
    return fetch(base() + "/rest/v1/" + table, {
      method: "POST",
      headers: authHeaders({ Prefer: "resolution=merge-duplicates,return=minimal" }),
      body: JSON.stringify(body)
    }).then(function (r) { if (!r.ok) return r.text().then(function (t) { throw new Error("Save failed: " + t); }); });
  }

  function writeRecord(entity, row) {
    return upsert("records", { id: row.id, entity: entity, company_id: row.companyId || null, project_id: row.projectId || null, data: row, updated_at: new Date().toISOString() });
  }
  function writeCompany(row) { return upsert("companies", { id: row.id, data: row }); }
  function writeProject(row) { return upsert("projects", { id: row.id, company_id: row.companyId || null, data: row }); }

  function removeRecord(id) {
    return fetch(base() + "/rest/v1/records?id=eq." + id, { method: "DELETE", headers: authHeaders() })
      .then(function (r) { if (!r.ok) throw new Error("Delete failed"); });
  }

  // Call a deployed Supabase Edge Function (secure server-side proxy for secret-key APIs).
  function invokeFunction(name, body) {
    return fetch(base() + "/functions/v1/" + name, {
      method: "POST", headers: authHeaders(), body: JSON.stringify(body || {})
    }).then(function (r) {
      return r.text().then(function (t) {
        var j; try { j = JSON.parse(t); } catch (e) { j = { raw: t }; }
        if (!r.ok) throw new Error(j.error || j.message || ("HTTP " + r.status));
        return j;
      });
    });
  }

  // Push an entire local DB to the cloud (one-time migration / seeding).
  function pushAll(db) {
    var ops = [];
    (db.companies || []).forEach(function (c) { ops.push(writeCompany(c)); });
    (db.projects || []).forEach(function (p) { ops.push(writeProject(p)); });
    Object.keys(db.records || {}).forEach(function (ent) {
      (db.records[ent] || []).forEach(function (r) { ops.push(writeRecord(ent, r)); });
    });
    return Promise.all(ops).then(function () { return ops.length; });
  }

  global.Cloud = {
    enabled: enabled, signIn: signIn, signOut: signOut, restoreSession: restoreSession,
    currentUser: currentUser, loadProfile: loadProfile, loadAll: loadAll,
    writeRecord: writeRecord, writeCompany: writeCompany, writeProject: writeProject, removeRecord: removeRecord,
    pushAll: pushAll, invokeFunction: invokeFunction
  };
})(window);

  <script>
/* AtriaERP — Local data store
 * Persists everything to localStorage so the app works offline by double-clicking index.html.
 * Data shape: { meta, companies[], projects[], records: { <entityKey>: [ ...rows ] } }
 */
(function (global) {
  "use strict";

  var KEY = "atriaerp.db.v1";
  var listeners = [];

  var DB = null;
  function cloudOn() { return global.Cloud && global.Cloud.enabled && global.Cloud.enabled(); }
  function cloudSafe(fn) { try { var p = fn(); if (p && p.catch) p.catch(function (e) { console.warn("Cloud sync:", e.message); Toast && Toast.show && Toast.show("Cloud sync issue — will retry", "bad"); }); } catch (e) {} }

  function uid(prefix) {
    return (prefix || "id") + "_" + Math.random().toString(36).slice(2, 9) + Date.now().toString(36).slice(-4);
  }

  function todayISO() { return new Date().toISOString().slice(0, 10); }

  function load() {
    try {
      var raw = localStorage.getItem(KEY);
      if (raw) { DB = JSON.parse(raw); return; }
    } catch (e) { console.warn("Load failed, reseeding", e); }
    DB = null; // will be seeded by seed.js
  }

  function save() {
    try {
      localStorage.setItem(KEY, JSON.stringify(DB));
    } catch (e) {
      console.error("Save failed", e);
      Toast && Toast.show && Toast.show("Could not save — storage may be full", "bad");
    }
    if (cloudOn() && DB && DB.meta) { try { localStorage.setItem("atriaerp.ctx", JSON.stringify(DB.meta.context)); } catch (e2) {} }
    emit();
  }

  function emit() { listeners.forEach(function (fn) { try { fn(DB); } catch (e) {} }); }
  function subscribe(fn) { listeners.push(fn); return function () { listeners = listeners.filter(function (f) { return f !== fn; }); }; }

  /* ---- context (selected company / project) ---- */
  function getContext() { return DB.meta.context; }
  function setCompany(companyId) {
    DB.meta.context.companyId = companyId;
    var projs = listProjects(companyId);
    DB.meta.context.projectId = projs.length ? projs[0].id : null;
    save();
  }
  function setProject(projectId) { DB.meta.context.projectId = projectId; save(); }

  function currentCompany() { return DB.companies.find(function (c) { return c.id === DB.meta.context.companyId; }) || DB.companies[0]; }
  function currentProject() { return DB.projects.find(function (p) { return p.id === DB.meta.context.projectId; }) || null; }

  /* ---- companies / projects ---- */
  function listCompanies() { return DB.companies.slice(); }
  function listProjects(companyId) {
    companyId = companyId || DB.meta.context.companyId;
    return DB.projects.filter(function (p) { return p.companyId === companyId; });
  }
  function addCompany(data) {
    var c = Object.assign({ id: uid("co"), createdAt: todayISO() }, data);
    DB.companies.push(c); save();
    if (cloudOn()) cloudSafe(function () { return Cloud.writeCompany(c); });
    return c;
  }
  function addProject(data) {
    var p = Object.assign({ id: uid("pr"), createdAt: todayISO() }, data);
    DB.projects.push(p); save();
    if (cloudOn()) cloudSafe(function () { return Cloud.writeProject(p); });
    return p;
  }
  function updateCompany(data) {
    var i = DB.companies.findIndex(function (c) { return c.id === data.id; });
    if (i < 0) return null;
    DB.companies[i] = Object.assign({}, DB.companies[i], data); save();
    if (cloudOn()) cloudSafe(function () { return Cloud.writeCompany(DB.companies[i]); });
    return DB.companies[i];
  }
  function updateProject(data) {
    var i = DB.projects.findIndex(function (p) { return p.id === data.id; });
    if (i < 0) return null;
    DB.projects[i] = Object.assign({}, DB.projects[i], data); save();
    if (cloudOn()) cloudSafe(function () { return Cloud.writeProject(DB.projects[i]); });
    return DB.projects[i];
  }
  function removeProject(id) {
    DB.projects = DB.projects.filter(function (p) { return p.id !== id; });
    if (DB.meta.context.projectId === id) { var ps = listProjects(); DB.meta.context.projectId = ps.length ? ps[0].id : null; }
    save();
  }

  /* ---- generic records ----
   * Each entity stored under records[entityKey]. Rows may carry companyId/projectId.
   */
  function bucket(entityKey) {
    if (!DB.records[entityKey]) DB.records[entityKey] = [];
    return DB.records[entityKey];
  }

  function list(entityKey, opts) {
    opts = opts || {};
    var rows = bucket(entityKey).slice();
    if (opts.scope === "company" || opts.scope === "project") {

    }
    if (opts.scope === "project" && DB.meta.context.projectId) {

  function upsert(entityKey, data, scope) {

    if (scope === "company" || scope === "project") row.companyId = row.companyId || DB.meta.context.companyId;
    if (scope === "project") row.projectId = row.projectId || DB.meta.context.projectId;
    arr.push(row); save();
    if (cloudOn()) cloudSafe(function () { return Cloud.writeRecord(entityKey, row); });

  }

  function remove(entityKey, id) {

    var projs = listProjects(DB.meta.context.companyId);
    if (!DB.meta.context.projectId && projs.length) DB.meta.context.projectId = projs[0].id;

    getContext: getContext, setCompany: setCompany, setProject: setProject,
    currentCompany: currentCompany, currentProject: currentProject,

    return "₹" + n.toLocaleString("en-IN", { maximumFractionDigits: 0 });
  }
  function inrShort(n) {
    if (n == null || isNaN(n)) return "—";
    n = Number(n);
    var sign = n < 0 ? "-" : ""; n = Math.abs(n);
    if (n >= 1e7) return sign + "₹" + (n / 1e7).toFixed(2).replace(/\.00$/, "") + " Cr";
    if (n >= 1e5) return sign + "₹" + (n / 1e5).toFixed(2).replace(/\.00$/, "") + " L";
    if (n >= 1e3) return sign + "₹" + (n / 1e3).toFixed(1).replace(/\.0$/, "") + "K";
    return sign + "₹" + n.toLocaleString("en-IN");
  }
  function fmtDate(s) {
    if (!s) return "—";
    var dt = new Date(s); if (isNaN(dt)) return esc(s);
    return dt.toLocaleDateString("en-IN", { day: "2-digit", month: "short", year: "numeric" });
  }
  function daysFromNow(s) {
    if (!s) return null;
    var dt = new Date(s); if (isNaN(dt)) return null;
    return Math.round((dt - new Date().setHours(0,0,0,0)) / 86400000);
  }

  function fmtCell(value, col) {
    if (col.type === "money") return inr(value);
    if (col.type === "number") return value == null || value === "" ? "—" : Number(value).toLocaleString("en-IN");
    if (col.type === "percent") return value == null || value === "" ? "—" : value + "%";
    if (col.type === "date") return fmtDate(value);
    if (col.type === "badge") {
      if (value == null || value === "") return "—";
      var cls = (col.map && col.map[value]) || "muted";
      return '<span class="badge ' + cls + '">' + esc(value) + "</span>";
    }
    return esc(value == null || value === "" ? "—" : value);
  }

  /* ---- toast ---- */
  var Toast = {
    show: function (msg, kind) {
      var host = document.getElementById("toastHost");
      var t = el('<div class="toast ' + (kind || "") + '">' + esc(msg) + "</div>");
      host.appendChild(t);
      setTimeout(function () { t.style.opacity = "0"; t.style.transition = "opacity .3s"; setTimeout(function () { t.remove(); }, 300); }, 2600);
    }
  };

  /* ---- modal ---- */
  var Modal = {
    open: function (title, bodyNode, footNode) {
      var backdrop = document.getElementById("modalBackdrop");
      var modal = document.getElementById("modal");
      modal.innerHTML = "";
      var head = el('<div class="modal-head"><h2>' + esc(title) + '</h2><button class="icon-btn" id="modalClose" style="color:#666">&times;</button></div>');
      var body = el('<div class="modal-body"></div>'); body.appendChild(bodyNode);
      modal.appendChild(head); modal.appendChild(body);
      if (footNode) { var foot = el('<div class="modal-foot"></div>'); foot.appendChild(footNode); modal.appendChild(foot); }
      backdrop.hidden = false;
      head.querySelector("#modalClose").onclick = Modal.close;
      backdrop.onclick = function (e) { if (e.target === backdrop) Modal.close(); };
    },
    close: function () { document.getElementById("modalBackdrop").hidden = true; }
  };

  function confirmDialog(message, onYes, yesLabel) {
    var body = el('<div><p style="margin:0 0 4px">' + esc(message) + "</p></div>");
    var foot = el('<div class="row-flex"></div>');
    var cancel = el('<button class="btn">Cancel</button>');
    var ok = el('<button class="btn danger">' + esc(yesLabel || "Delete") + "</button>");
    cancel.onclick = Modal.close;
    ok.onclick = function () { Modal.close(); onYes(); };
    foot.appendChild(cancel); foot.appendChild(ok);
    Modal.open("Please confirm", body, foot);
  }

  /* ---- form builder (from schema fields) ---- */
  function buildForm(fields, record, onSubmit, submitLabel) {
    record = record || {};
    var form = el('<form class="form-grid"></form>');
    fields.forEach(function (fld) {
      var wrap = el('<div class="field' + (fld.full ? " full" : "") + (fld.req ? " req" : "") + '"></div>');
      var lbl = el("<label>" + esc(fld.label) + "</label>");
      wrap.appendChild(lbl);
      var val = record[fld.f] != null ? record[fld.f] : (fld.def != null ? fld.def : "");
      var input;
      if (fld.type === "textarea") {
        input = el('<textarea name="' + fld.f + '"></textarea>'); input.value = val;
      } else if (fld.type === "select") {
        input = el('<select name="' + fld.f + '"></select>');
        if (!fld.req) input.appendChild(el('<option value="">— select —</option>'));
        (fld.options || []).forEach(function (o) {
          var opt = el('<option>' + esc(o) + "</option>"); if (o === val) opt.selected = true; input.appendChild(opt);
        });
      } else {
        var itype = fld.type === "money" || fld.type === "number" || fld.type === "percent" ? "number" : (fld.type === "date" ? "date" : (fld.type === "email" ? "email" : "text"));
        input = el('<input type="' + itype + '" name="' + fld.f + '" />');
        input.value = val;
        if (fld.type === "money" || fld.type === "percent") input.step = "any";
      }
      if (fld.req) input.required = true;
      wrap.appendChild(input);
      if (fld.hint) wrap.appendChild(el('<div class="hint">' + esc(fld.hint) + "</div>"));
      form.appendChild(wrap);
    });
    form.onsubmit = function (e) {
      e.preventDefault();
      var data = {};
      fields.forEach(function (fld) {
        var node = form.querySelector('[name="' + fld.f + '"]');
        var v = node.value;
        if ((fld.type === "money" || fld.type === "number" || fld.type === "percent") && v !== "") v = Number(v);
        data[fld.f] = v;
      });
      if (record.id) data.id = record.id;
      onSubmit(data);
    };
    var foot = el('<div class="row-flex"></div>');
    var cancel = el('<button type="button" class="btn">Cancel</button>'); cancel.onclick = Modal.close;
    var save = el('<button type="submit" class="btn primary">' + esc(submitLabel || "Save") + "</button>");
    save.onclick = function () { form.requestSubmit ? form.requestSubmit() : form.dispatchEvent(new Event("submit", { cancelable: true })); };
    foot.appendChild(cancel); foot.appendChild(save);
    return { form: form, foot: foot };
  }

  /* ---- generic data table ---- */
  function dataTable(rows, columns, opts) {
    opts = opts || {};
    var wrap = el('<div class="table-wrap"></div>');
    if (!rows.length) {
      wrap.appendChild(el('<div class="empty-state"><div class="big">📭</div><div>' + esc(opts.emptyText || "No records yet.") + "</div></div>"));
      return wrap;
    }
    var table = el('<table class="data"></table>');
    var thead = el("<thead><tr></tr></thead>");
    var htr = thead.querySelector("tr");
    columns.forEach(function (c) {
      var numeric = c.type === "money" || c.type === "number" || c.type === "percent";
      htr.appendChild(el('<th class="' + (numeric ? "num" : "") + '" data-f="' + c.f + '">' + esc(c.label) + "</th>"));
    });
    if (opts.actions) htr.appendChild(el('<th class="num">Actions</th>'));
    table.appendChild(thead);
    var tbody = el("<tbody></tbody>");
    rows.forEach(function (r) {
      var tr = el("<tr></tr>");
      columns.forEach(function (c) {
        var numeric = c.type === "money" || c.type === "number" || c.type === "percent";
        tr.appendChild(el('<td class="' + (numeric ? "num" : "") + '">' + fmtCell(r[c.f], c) + "</td>"));
      });
      if (opts.actions) {
        var td = el('<td class="num"><div class="row-actions"></div></td>');
        var box = td.querySelector(".row-actions");
        var edit = el('<button class="btn sm">Edit</button>'); edit.onclick = function () { opts.onEdit(r); };
        var del = el('<button class="btn sm danger">Delete</button>'); del.onclick = function () { opts.onDelete(r); };
        box.appendChild(edit); box.appendChild(del);
        tr.appendChild(td);
      }
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    wrap.appendChild(table);
    return wrap;
  }

  function kpiCard(label, value, sub, icon) {
    return el('<div class="card kpi"><div class="kpi-icon">' + (icon || "📌") + '</div>' +
      '<div class="kpi-label">' + esc(label) + '</div>' +
      '<div class="kpi-value">' + value + '</div>' +
      '<div class="kpi-sub">' + (sub || "") + "</div></div>");
  }

  function pageHead(title, sub, actionsNode) {
    var head = el('<div class="page-head"><div><h1>' + esc(title) + '</h1><div class="sub">' + esc(sub || "") + "</div></div></div>");
    if (actionsNode) { var box = el('<div class="row-flex"></div>'); box.appendChild(actionsNode); head.appendChild(box); }
    return head;
  }

  global.UI = {
    el: el, esc: esc, inr: inr, inrShort: inrShort, fmtDate: fmtDate, fmtCell: fmtCell, daysFromNow: daysFromNow,
    Toast: Toast, Modal: Modal, confirmDialog: confirmDialog, buildForm: buildForm, dataTable: dataTable,
    kpiCard: kpiCard, pageHead: pageHead
  };
  global.Toast = Toast;
})(window);

</script>
  <script>
/* AtriaERP — Views: dashboard + generic entity (list/CRUD) view */
(function (global) {
  "use strict";
  var U = global.UI;

  /* ---------- Generic entity view (drives most modules) ---------- */
  function renderEntity(entityKey, mount) {
    var def = Schema.ENTITIES[entityKey];
    var state = { q: "", sortF: null, sortDir: 1, filter: "" };

    function rows() {
      var all = Store.list(entityKey, { scope: def.scope });
      var q = state.q.toLowerCase().trim();
      if (q) {
        all = all.filter(function (r) {
          return def.columns.some(function (c) { return String(r[c.f] == null ? "" : r[c.f]).toLowerCase().indexOf(q) >= 0; });
        });
      }
      if (state.filter) {
        var fcol = def.columns.find(function (c) { return c.type === "badge"; });
        if (fcol) all = all.filter(function (r) { return r[fcol.f] === state.filter; });
      }
      if (state.sortF) {
        all.sort(function (a, b) {
          var x = a[state.sortF], y = b[state.sortF];
          if (typeof x === "number" || typeof y === "number") return ((x || 0) - (y || 0)) * state.sortDir;
          return String(x || "").localeCompare(String(y || "")) * state.sortDir;
        });
      }
      return all;
    }

    function openForm(record) {
      var built = U.buildForm(def.fields, record, function (data) {
        Store.upsert(entityKey, data, def.scope);
        U.Modal.close();
        U.Toast.show((record ? "Updated" : "Added") + " " + def.singular, "good");
        draw();
      }, record ? "Update" : "Add " + def.singular);
      U.Modal.open((record ? "Edit " : "New ") + def.singular, built.form, built.foot);
    }

    function draw() {
      mount.innerHTML = "";
      var scopeNote = def.scope === "project" ? (Store.currentProject() ? Store.currentProject().name : "—")
        : def.scope === "company" ? Store.currentCompany().name : "All";

      var actions = U.el('<div class="row-flex"></div>');
      if (global.DataIO) {
        var impBtn = U.el('<button class="btn" title="Bulk import from Excel/CSV">⬆ Import</button>');
        impBtn.onclick = function () { DataIO.openImport(entityKey, draw); };
        var expBtn = U.el('<button class="btn" title="Export to CSV/Excel">⬇ Export</button>');
        expBtn.onclick = function () { DataIO.exportEntity(entityKey); };
        actions.appendChild(impBtn); actions.appendChild(expBtn);
      }
      var addBtn = U.el('<button class="btn primary">+ New ' + U.esc(def.singular) + "</button>");
      addBtn.onclick = function () { openForm(null); };
      actions.appendChild(addBtn);
      mount.appendChild(U.pageHead(def.title, def.desc + "  •  Scope: " + scopeNote, actions));

      if (def.tally) mount.appendChild(tallyBanner(entityKey, draw));

      // toolbar
      var toolbar = U.el('<div class="toolbar"></div>');
      var search = U.el('<div class="search"><input type="search" placeholder="Search ' + U.esc(def.title.toLowerCase()) + '…" /></div>');
      search.querySelector("input").value = state.q;
      search.querySelector("input").oninput = function (e) { state.q = e.target.value; drawTable(); };
      toolbar.appendChild(search);

      var badgeCol = def.columns.find(function (c) { return c.type === "badge"; });
      if (badgeCol) {
        var vals = {};
        Store.list(entityKey, { scope: def.scope }).forEach(function (r) { if (r[badgeCol.f]) vals[r[badgeCol.f]] = 1; });
        var sel = U.el('<select><option value="">All ' + U.esc(badgeCol.label) + "</option></select>");
        Object.keys(vals).forEach(function (v) { var o = U.el("<option>" + U.esc(v) + "</option>"); if (v === state.filter) o.selected = true; sel.appendChild(o); });
        sel.onchange = function (e) { state.filter = e.target.value; drawTable(); };
        toolbar.appendChild(sel);
      }
      var count = U.el('<div class="muted" style="margin-left:auto"></div>');
      toolbar.appendChild(count);
      mount.appendChild(toolbar);

      var tableHost = U.el("<div></div>");
      mount.appendChild(tableHost);

      function drawTable() {
        var data = rows();
        count.textContent = data.length + " record" + (data.length === 1 ? "" : "s");
        tableHost.innerHTML = "";
        var tbl = U.dataTable(data, def.columns, {
          actions: true,
          emptyText: "No " + def.title.toLowerCase() + " yet. Click “New " + def.singular + "”.",
          onEdit: openForm,
          onDelete: function (r) {
            U.confirmDialog("Delete this " + def.singular.toLowerCase() + "? This cannot be undone.", function () {
              Store.remove(entityKey, r.id); U.Toast.show("Deleted", "bad"); draw();
            });
          }
        });
        // header sort
        tbl.querySelectorAll("th[data-f]").forEach(function (th) {
          th.onclick = function () {
            var f = th.getAttribute("data-f");
            if (state.sortF === f) state.sortDir *= -1; else { state.sortF = f; state.sortDir = 1; }
            drawTable();
          };
        });
        tableHost.appendChild(tbl);
      }
      drawTable();

      // money summary footer if any money column
      var moneyCol = def.columns.find(function (c) { return c.type === "money"; });
      if (moneyCol) {
        var total = rows().reduce(function (s, r) { return s + (Number(r[moneyCol.f]) || 0); }, 0);
        mount.appendChild(U.el('<div class="muted" style="margin-top:10px">Total ' + U.esc(moneyCol.label) + ": <b>" + U.inr(total) + "</b> (" + U.inrShort(total) + ")</div>"));
      }
    }
    draw();
  }

  function tallyBanner(entityKey, redraw) {
    var integ = Store.raw().meta.integrations.tally;
    var box = U.el('<div class="notice ' + (integ.connected ? "" : "warn") + '"><span class="ni">🔌</span><div style="flex:1"></div></div>');
    var info = box.querySelector("div");
    info.innerHTML = integ.connected
      ? "Connected to <b>Tally</b> at " + U.esc(integ.host) + ". Last sync: " + (integ.lastSync ? U.fmtDate(integ.lastSync) : "—") + "."
      : "<b>Tally not connected.</b> Showing locally entered ledgers. Connect Tally to auto-pull this list.";
    var btn = U.el('<button class="btn sm">' + (integ.connected ? "Sync now" : "Connect & Sync") + "</button>");
    btn.onclick = function () { Integrations.tallySync(entityKey, redraw); };
    box.appendChild(btn);
    return box;
  }

  /* ---------- Dashboard ---------- */
  function renderDashboard(mount) {
    mount.innerHTML = "";
    var co = Store.currentCompany(), pr = Store.currentProject();
    mount.appendChild(U.pageHead("Dashboard", co.name + (pr ? "  •  " + pr.name : "")));
    mount.appendChild(U.el('<div class="muted" style="margin:-8px 0 14px;font-size:12px">Tip: click any card below to open that module.</div>'));

    function link(node, route) { node.classList.add("clickable-card"); node.title = "Open"; node.addEventListener("click", function () { App.route(route); }); return node; }

    // KPIs
    var units = Store.list("units", { scope: "project" });
    var available = units.filter(function (u) { return u.status === "Available"; }).length;
    var leads = Store.list("leads", { scope: "project" });
    var openLeads = leads.filter(function (l) { return ["New", "Contacted", "Site Visit", "Negotiation"].indexOf(l.stage) >= 0; }).length;
    var pays = Store.list("payments", { scope: "project" });
    var due = pays.filter(function (p) { return p.status !== "Paid"; }).reduce(function (s, p) { return s + (Number(p.amount) || 0); }, 0);
    var received = pays.filter(function (p) { return p.status === "Paid"; }).reduce(function (s, p) { return s + (Number(p.amount) || 0); }, 0);
    var creditors = Store.list("creditors", { scope: "company" }).reduce(function (s, c) { return s + (Number(c.outstanding) || 0); }, 0);
    var salesValue = units.filter(function (u) { return ["Booked", "Sold", "Registered"].indexOf(u.status) >= 0; }).reduce(function (s, u) { return s + (Number(u.price) || 0); }, 0);

    var kpis = U.el('<div class="cards grid-4"></div>');
    kpis.appendChild(link(U.kpiCard("Units Available", available + " / " + units.length, "in " + (pr ? pr.name : "project"), "🏢"), "units"));
    kpis.appendChild(link(U.kpiCard("Open Leads", openLeads, leads.length + " total in funnel", "🎯"), "leads"));
    kpis.appendChild(link(U.kpiCard("Sales Booked", U.inrShort(salesValue), "value of booked/sold units", "📈"), "reports"));
    kpis.appendChild(link(U.kpiCard("Payments Due", U.inrShort(due), U.inrShort(received) + " received", "💰"), "collections"));
    mount.appendChild(kpis);

    // second row
    var row2 = U.el('<div class="cards grid-3" style="margin-top:16px"></div>');

    // Sales funnel
    var funnel = U.el('<div class="card"><div class="card-section-head"><h3>Sales Funnel</h3><span class="muted">' + leads.length + ' leads</span></div></div>');
    var stages = Schema.sets.LEAD_STAGES;
    var maxC = Math.max.apply(null, stages.map(function (s) { return leads.filter(function (l) { return l.stage === s; }).length; }).concat([1]));
    stages.forEach(function (st) {
      var c = leads.filter(function (l) { return l.stage === st; }).length;
      funnel.appendChild(U.el('<div class="bar-row"><div class="bar-label">' + st + '</div><div class="bar-track"><div class="bar-fill" style="width:' + (c / maxC * 100) + '%"></div></div><div class="bar-val">' + c + "</div></div>"));
    });
    row2.appendChild(link(funnel, "leads"));

    // Inventory status
    var inv = U.el('<div class="card"><div class="card-section-head"><h3>Inventory Status</h3></div></div>');
    var statuses = ["Available", "Booked", "Sold", "Registered", "Blocked"];
    var maxU = Math.max.apply(null, statuses.map(function (s) { return units.filter(function (u) { return u.status === s; }).length; }).concat([1]));
    statuses.forEach(function (st) {
      var c = units.filter(function (u) { return u.status === st; }).length;
      inv.appendChild(U.el('<div class="bar-row"><div class="bar-label">' + st + '</div><div class="bar-track"><div class="bar-fill" style="width:' + (c / maxU * 100) + '%"></div></div><div class="bar-val">' + c + "</div></div>"));
    });
    row2.appendChild(link(inv, "units"));

    // Finance snapshot
    var fin = U.el('<div class="card"><div class="card-section-head"><h3>Finance Snapshot (' + U.esc(co.name.split(" ")[0]) + ')</h3></div></div>');
    var debtors = Store.list("debtors", { scope: "company" }).reduce(function (s, x) { return s + (Number(x.outstanding) || 0); }, 0);
    var gstPending = Store.list("gst", { scope: "company" }).filter(function (g) { return g.returnStatus !== "Filed"; }).length;
    var tdsPending = Store.list("tds", { scope: "company" }).filter(function (t) { return t.challanStatus !== "Deposited"; }).length;
    [["Receivables (Debtors)", U.inr(debtors)], ["Payables (Creditors)", U.inr(creditors)], ["Payments received (project)", U.inr(received)], ["GST returns pending", gstPending], ["TDS challans pending", tdsPending]]
      .forEach(function (p) { fin.appendChild(U.el('<div class="stat-line"><span>' + p[0] + '</span><b>' + p[1] + "</b></div>")); });
    row2.appendChild(link(fin, "collections"));
    mount.appendChild(row2);

    // third row: reminders + activity
    var row3 = U.el('<div class="cards grid-2" style="margin-top:16px"></div>');

    var reminders = U.el('<div class="card"><div class="card-section-head"><h3>⏰ Reminders & Alerts</h3></div></div>');
    var alerts = collectReminders();
    if (!alerts.length) reminders.appendChild(U.el('<div class="muted">Nothing urgent. 🎉</div>'));
    var ul = U.el('<ul class="list-plain"></ul>');
    alerts.slice(0, 8).forEach(function (a) {
      var li = U.el('<li style="cursor:pointer"><span class="dotmark" style="background:' + a.color + '"></span><div><div>' + U.esc(a.text) + '</div><small class="muted">' + U.esc(a.meta) + "</small></div></li>");
      li.onclick = function () { App.route(a.route || "calendar"); };
      ul.appendChild(li);
    });
    reminders.appendChild(ul);
    var calBtn = U.el('<button class="btn sm" style="margin-top:10px">Open Calendar →</button>'); calBtn.onclick = function () { App.route("calendar"); };
    reminders.appendChild(calBtn);
    row3.appendChild(reminders);

    var construction = U.el('<div class="card"><div class="card-section-head"><h3>🏗️ Construction Progress</h3></div></div>');
    var stagesC = Store.list("construction", { scope: "project" });
    if (!stagesC.length) construction.appendChild(U.el('<div class="muted">No construction updates for this project.</div>'));
    stagesC.forEach(function (s) {
      construction.appendChild(U.el('<div style="margin:12px 0"><div class="spread"><b>' + U.esc(s.block) + '</b><span class="badge info">' + U.esc(s.stage) + '</span></div><div class="progress" style="margin-top:6px"><span style="width:' + (s.progress || 0) + '%"></span></div><small class="muted">' + (s.progress || 0) + "% • updated " + U.fmtDate(s.updatedOn) + "</small></div>"));
    });
    row3.appendChild(link(construction, "construction"));
    mount.appendChild(row3);
  }

  function collectReminders() {
    var out = [];
    Store.list("payments", { scope: "project" }).forEach(function (p) {
      var dd = U.daysFromNow(p.dueDate);
      if (p.status !== "Paid" && dd != null && dd <= 7) {
        out.push({ route: "collections", sort: dd, color: dd < 0 ? "#dc2626" : "#d97706", text: (dd < 0 ? "Overdue payment" : "Payment due") + ": " + p.customer + " — " + U.inrShort(p.amount), meta: p.unit + " • " + p.milestone + " • " + U.fmtDate(p.dueDate) });
      }
    });
    Store.list("schedule", { scope: "project" }).forEach(function (s) {
      var dd = U.daysFromNow(s.end);
      if (s.status !== "Done" && dd != null && dd <= 5) {
        out.push({ route: "schedule", sort: dd, color: dd < 0 ? "#dc2626" : "#1f6feb", text: (dd < 0 ? "Schedule overdue" : "Task due") + ": " + s.task, meta: s.contractor + " • due " + U.fmtDate(s.end) });
      }
    });
    Store.list("land", { scope: "company" }).forEach(function (l) {
      var dd = U.daysFromNow(l.reminderDate);
      if (dd != null && dd <= 7) out.push({ route: "landdesk", sort: dd, color: "#14b8a6", text: "Land reminder: " + l.parcel, meta: l.stage + " • " + U.fmtDate(l.reminderDate) });
    });
    Store.list("liaisoning", { scope: "project" }).forEach(function (a) {
      if (a.status === "Query Raised") out.push({ route: "liaisoning", sort: -1, color: "#d97706", text: "Approval query: " + a.approval, meta: a.authority + " • " + (a.fileNo || "") });
      var dd = U.daysFromNow(a.nextFollowUp);
      if (dd != null && dd <= 7 && a.status !== "Approved") out.push({ route: "liaisoning", sort: dd, color: "#1f6feb", text: "Liaison follow-up: " + a.approval, meta: a.authority + " • " + U.fmtDate(a.nextFollowUp) });
    });
    Store.list("rentals", { scope: "company" }).forEach(function (r) {
      var dd = U.daysFromNow(r.leaseEnd);
      if (dd != null && dd <= 90 && r.status !== "Vacated") out.push({ route: "rentdesk", sort: dd, color: "#d97706", text: "Lease ending: " + r.tenant, meta: r.unit + " • " + U.fmtDate(r.leaseEnd) });
    });
    out.sort(function (a, b) { return a.sort - b.sort; });
    return out;
  }

  global.Views = { renderEntity: renderEntity, renderDashboard: renderDashboard, tallyBanner: tallyBanner };
})(window);

  <script>
/* AtriaERP — Integration & special views
 * These screens model the real integrations (Tally, Axis Bank, Net Banking, WhatsApp, Email,
 * e-Courts, Vendor Portal). Sync actions are SIMULATED locally and clearly marked, with the
 * exact connection settings exposed so they can be wired to live APIs later.
 */
(function (global) {
  "use strict";
  var U = global.UI;

  function stubNotice(text) {
    return U.el('<div class="notice"><span class="ni">🧪</span><div><b>Simulation mode.</b> ' + U.esc(text) + ' No real data leaves this PC until live credentials are configured.</div></div>');

  /* ---------- Tally sync (used by creditors/debtors) ---------- */

  }

  /* ---------- Bank balances (Axis API) ---------- */
  function renderBank(mount) {
    mount.innerHTML = "";
    mount.appendChild(U.pageHead("Bank Balances — Axis Bank API", "Live current/escrow account balances pulled via Axis Bank Corporate API."));

    var accounts = bankAccounts(co.id);

    var refresh = U.el('<button class="btn primary">⟳ Refresh Balances</button>');

    var spacer = U.el('<div style="margin-left:auto"></div>'); spacer.appendChild(refresh); toolbar.appendChild(spacer);
    mount.appendChild(toolbar);

    var cards = U.el('<div class="cards grid-3"></div>');
    accounts.forEach(function (a) {
      var card = U.el('<div class="card"><div class="spread"><h3 style="margin:0">' + U.esc(a.label) + '</h3><span class="badge ' + (a.type === "Escrow" ? "info" : "good") + '">' + a.type + '</span></div>' +
        '<div class="muted" style="font-size:12px;margin:6px 0">A/C ' + U.esc(a.acno) + ' • Axis Bank</div>' +
        '<div class="kpi-value" style="font-size:24px">' + U.inr(a.balance) + '</div>' +
        '<div class="muted" style="font-size:12px">Available • as of ' + U.fmtDate(Store.todayISO()) + "</div></div>");

    refresh.onclick = function () {
      var db = Store.raw();
      db.meta.integrations.axis.connected = true; db.meta.integrations.axis.lastSync = new Date().toISOString();
      db._bank = db._bank || {};
      db._bank[co.id] = accounts.map(function (a) {
        return Object.assign({}, a, { balance: Math.max(0, Math.round(a.balance * (0.96 + Math.random() * 0.08))) });

  function bankAccounts(companyId) {
    var db = Store.raw();
    if (db._bank && db._bank[companyId]) return db._bank[companyId];
    var seedMap = {
      co_atria: [
        { label: "Current Account", acno: "9180•••2201", type: "Current", balance: 28450000 },
        { label: "RERA Escrow (Atria Heights)", acno: "9180•••7745", type: "Escrow", balance: 61200000 },
        { label: "RERA Escrow (Atria Grand)", acno: "9180•••7746", type: "Escrow", balance: 18900000 }
      ],
      co_skyline: [{ label: "Current Account", acno: "9181•••3320", type: "Current", balance: 7400000 }, { label: "RERA Escrow", acno: "9181•••8890", type: "Escrow", balance: 15600000 }],
      co_green: [{ label: "Current Account", acno: "9182•••1180", type: "Current", balance: 4200000 }]
    };
    return seedMap[companyId] || [{ label: "Current Account", acno: "—", type: "Current", balance: 0 }];

  /* ---------- Net Banking payments ---------- */
  function renderNetBanking(mount) {
    mount.innerHTML = "";

    newBtn.onclick = function () {

        { f: "mode", label: "Mode", type: "select", options: ["NEFT", "RTGS", "IMPS"], def: "RTGS" },
        { f: "account", label: "Beneficiary A/C", type: "text" },

      var built = U.buildForm(fields, null, function (data) {

        db._payqueue[co.id].unshift(data); Store.save();

    };
    mount.appendChild(U.pageHead("", "", null)); // spacing noop
    var bar = U.el('<div class="toolbar"></div>'); bar.appendChild(U.el('<div class="muted">From: <b>' + U.esc(co.name) + '</b> • Axis Bank Corporate</div>'));
    var sp = U.el('<div style="margin-left:auto"></div>'); sp.appendChild(newBtn); bar.appendChild(sp); mount.appendChild(bar);

    var cols = [
      { f: "date", label: "Date", type: "date" }, { f: "payee", label: "Payee" }, { f: "mode", label: "Mode" },
      { f: "amount", label: "Amount", type: "money" }, { f: "ref", label: "UTR/Ref" },
      { f: "status", label: "Status", type: "badge", map: { Paid: "good", "Pending Approval": "warn", Approved: "info", Failed: "bad" } }
    ];
    var host = U.el("<div></div>");
    function drawQ() {
      host.innerHTML = "";
      var q = (Store.raw()._payqueue && Store.raw()._payqueue[co.id]) || [];
      var tbl = U.dataTable(q, cols, {
        actions: true, emptyText: "No payment instructions yet.",
        onEdit: function (r) {
          if (r.status === "Pending Approval") { r.status = "Approved"; Store.save(); U.Toast.show("Approved — releasing to bank", "good"); setTimeout(function () { r.status = "Paid"; Store.save(); drawQ(); }, 600); }
          else U.Toast.show("Already " + r.status, "");
          drawQ();
        },
        onDelete: function (r) {
          var arr = Store.raw()._payqueue[co.id]; var i = arr.indexOf(r); if (i >= 0) arr.splice(i, 1); Store.save(); drawQ();
        }
      });
      tbl.querySelectorAll("th").forEach(function (th, i) { if (i === cols.length) th.textContent = "Approve / Cancel"; });
      tbl.querySelectorAll(".row-actions").forEach(function (box) {
        var b = box.querySelectorAll("button"); if (b[0]) b[0].textContent = "Approve"; if (b[1]) b[1].textContent = "Cancel";
      });

  /* ---------- WhatsApp Blast ---------- */
  function renderWhatsApp(mount) {
    mount.innerHTML = "";
    mount.appendChild(U.pageHead("WhatsApp Blast", "Send a templated WhatsApp broadcast to leads or customers."));
    mount.appendChild(stubNotice("“Send Blast” simulates delivery via WhatsApp Business API and logs it below."));
    var leads = Store.list("leads", { scope: "project" });

    var card = U.el('<div class="card"></div>');
    card.appendChild(U.el('<h3>Compose Broadcast</h3>'));

    form.appendChild(U.el('<div class="field full"><label>Audience</label><select id="waAud"><option value="all">All leads (' + leads.length + ')</option><option value="open">Open leads only</option><option value="sitevisit">Site Visit stage</option></select></div>'));
    form.appendChild(U.el('<div class="field full"><label>Message</label><textarea id="waMsg">🏠 Atria Heights — Limited 2 & 3 BHK sea-facing homes now open for booking! Book a site visit this weekend & get an exclusive offer. Reply YES to know more.</textarea></div>'));
    card.appendChild(form);

    mount.appendChild(card);

    var logHost = U.el('<div style="margin-top:16px"></div>');
    mount.appendChild(logHost);
    function drawLog() {
      var log = (Store.raw()._walog) || [];
      logHost.innerHTML = "";
      var c = U.el('<div class="card"><div class="card-section-head"><h3>Broadcast History</h3></div></div>');
      if (!log.length) c.appendChild(U.el('<div class="muted">No broadcasts sent yet.</div>'));

      });

    }
    drawLog();
    send.onclick = function () {
      var aud = card.querySelector("#waAud").value;
      var n = aud === "all" ? leads.length : aud === "open" ? leads.filter(function (l) { return ["New", "Contacted", "Site Visit", "Negotiation"].indexOf(l.stage) >= 0; }).length : leads.filter(function (l) { return l.stage === "Site Visit"; }).length;
      var db = Store.raw(); db._walog = db._walog || []; db._walog.unshift({ date: Store.todayISO(), audience: aud, count: n }); Store.save();
      U.Toast.show("WhatsApp blast sent to " + n + " contacts", "good"); drawLog();
    };

  /* ---------- Email (EmailJS) ---------- */
  function emailCfg() { return (Store.raw().meta.integrations || {}).email || {}; }
  function emailConfigured() { var e = emailCfg(); return !!(e.serviceId && e.templateId && e.publicKey); }
  function sendOneEmail(params) {
    var e = emailCfg();
    return fetch("https://api.emailjs.com/api/v1.0/email/send", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ service_id: e.serviceId, template_id: e.templateId, user_id: e.publicKey, template_params: params })
    }).then(function (r) { if (!r.ok) return r.text().then(function (t) { throw new Error(t || ("HTTP " + r.status)); }); return true; });
  }

  function renderEmail(mount) {
    mount.innerHTML = "";
    mount.appendChild(U.pageHead("Email Campaigns", "Send newsletters, demand notices and updates to your contacts."));
    var live = emailConfigured();
    if (live) mount.appendChild(U.el('<div class="notice"><span class="ni">📧</span><div><b>Connected to EmailJS.</b> Emails below are sent for real to each recipient.</div></div>'));
    else mount.appendChild(U.el('<div class="notice warn"><span class="ni">🧪</span><div><b>Simulation mode.</b> Add your EmailJS keys in <a href="#" id="goSettings">Settings &amp; Integrations</a> to send real emails. Until then, sends are just logged.</div></div>'));

    var co = Store.currentCompany();
    var leads = Store.list("leads", { scope: "project" }).filter(function (l) { return l.email; });
    var card = U.el('<div class="card"></div>');
    card.innerHTML = "<h3>Compose Email</h3>";
    var form = U.el('<div class="form-grid"></div>');
    form.appendChild(U.el('<div class="field"><label>To</label><select id="emAud"><option value="leads">Leads with email (' + leads.length + ")</option></select></div>"));
    form.appendChild(U.el('<div class="field"><label>Subject</label><input id="emSub" value="Update from ' + U.esc(co.name) + '" /></div>'));
    form.appendChild(U.el('<div class="field full"><label>Body</label><textarea id="emBody">Dear {{to_name}},\n\nThank you for your interest. We are pleased to share our latest offers.\n\nRegards,\n' + U.esc(co.name) + "</textarea></div>"));
    card.appendChild(form);
    var send = U.el('<button class="btn primary" style="margin-top:12px">✉️ ' + (live ? "Send Emails" : "Send (simulated)") + "</button>");
    var progress = U.el('<span class="muted" style="margin-left:10px"></span>');
    card.appendChild(send); card.appendChild(progress); mount.appendChild(card);

    var logHost = U.el('<div style="margin-top:16px"></div>'); mount.appendChild(logHost);
    function drawLog() {
      logHost.innerHTML = ""; var log = Store.raw()._emlog || [];
      var c = U.el('<div class="card"><div class="card-section-head"><h3>Sent Campaigns</h3></div></div>');
      if (!log.length) c.appendChild(U.el('<div class="muted">No campaigns sent yet.</div>'));
      log.slice(0, 10).forEach(function (l) { c.appendChild(U.el('<div class="stat-line"><span>' + U.fmtDate(l.date) + " • " + U.esc(l.subject) + (l.failed ? ' <span class="badge bad">' + l.failed + " failed</span>" : "") + '</span><b>' + l.count + " sent ✓</b></div>")); });
      logHost.appendChild(c);
    }
    drawLog();
    var gs = mount.querySelector("#goSettings"); if (gs) gs.onclick = function (e) { e.preventDefault(); App.route("settings"); };

    send.onclick = function () {
      var subject = card.querySelector("#emSub").value, body = card.querySelector("#emBody").value;
      if (!live) {
        var db = Store.raw(); db._emlog = db._emlog || []; db._emlog.unshift({ date: Store.todayISO(), subject: subject, count: leads.length }); Store.save();
        U.Toast.show("Simulated: logged " + leads.length + " emails", "good"); drawLog(); return;
      }
      if (!leads.length) { U.Toast.show("No recipients with an email address", "bad"); return; }
      send.disabled = true; var ok = 0, fail = 0, i = 0;
      function next() {
        if (i >= leads.length) {
          var db = Store.raw(); db._emlog = db._emlog || []; db._emlog.unshift({ date: Store.todayISO(), subject: subject, count: ok, failed: fail }); Store.save();
          U.Toast.show("Sent " + ok + " email(s)" + (fail ? ", " + fail + " failed" : ""), fail ? "bad" : "good");
          send.disabled = false; progress.textContent = ""; drawLog(); return;
        }
        var l = leads[i++]; progress.textContent = "Sending " + i + "/" + leads.length + "…";
        sendOneEmail({ to_email: l.email, to_name: l.name, subject: subject, message: body.replace(/\{\{to_name\}\}/g, l.name), from_name: co.name, reply_to: (Store.raw().meta.ownerEmail || "") })
          .then(function () { ok++; }).catch(function (e) { fail++; console.warn("Email to " + l.email + " failed:", e.message); })
          .then(function () { setTimeout(next, 350); });
      }
      next();
    };
  }

  /* ---------- E-Courts ---------- */
  function renderECourts(mount) {
    mount.innerHTML = "";

      box.appendChild(ed); box.appendChild(fetch); box.appendChild(del); tr.appendChild(act); tb.appendChild(tr);
    });
    table.appendChild(tb); wrap.appendChild(table); mount.appendChild(wrap);
  }
  function defaultCases() {

  /* ---------- Vendor Portal ---------- */
  function renderVendorPortal(mount) {
