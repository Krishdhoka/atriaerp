  <script>
/* AtriaERP — Collections & Reminders
 * Inspired by Khatabook + Biz Analyst: party-wise outstanding ("you'll get / you'll pay")
 * with REAL one-tap WhatsApp / SMS / Email reminders via deep links (wa.me, sms:, mailto:).
 */
(function (global) {
  "use strict";
  var U = global.UI;

  function sanitizePhone(p) {
    var d = String(p || "").replace(/\D/g, "");
    if (d.length === 10) d = "91" + d;          // assume India if 10 digits
    if (d.length === 11 && d[0] === "0") d = "91" + d.slice(1);
    return d;
  }
  function waLink(phone, msg) { return "https://wa.me/" + sanitizePhone(phone) + "?text=" + encodeURIComponent(msg); }
  function smsLink(phone, msg) { return "sms:" + sanitizePhone(phone) + "?&body=" + encodeURIComponent(msg); }
  function mailLink(email, subject, body) { return "mailto:" + (email || "") + "?subject=" + encodeURIComponent(subject) + "&body=" + encodeURIComponent(body); }

  function phoneForCustomer(name) {
    var lead = Store.list("leads", { scope: "company" }).find(function (l) { return l.name && name && l.name.toLowerCase() === String(name).toLowerCase(); });
    return lead ? { phone: lead.phone, email: lead.email } : { phone: "", email: "" };
  }

  // Aggregate receivables from unpaid payment demands, grouped by customer
  function receivables() {
    var map = {};
    Store.list("payments", { scope: "project" }).forEach(function (p) {
      if (p.status === "Paid") return;
      var amt = Number(p.amount) || 0; if (amt <= 0) return;
      var k = p.customer || "(unknown)";
      if (!map[k]) { var c = phoneForCustomer(k); map[k] = { name: k, phone: c.phone, email: c.email, total: 0, count: 0, oldest: p.dueDate, overdue: false, units: {} }; }
      map[k].total += amt; map[k].count++;
      if (p.unit) map[k].units[p.unit] = 1;
      if (p.dueDate && (!map[k].oldest || p.dueDate < map[k].oldest)) map[k].oldest = p.dueDate;
      if (p.status === "Overdue" || (U.daysFromNow(p.dueDate) != null && U.daysFromNow(p.dueDate) < 0)) map[k].overdue = true;
    });
    return Object.keys(map).map(function (k) { var r = map[k]; r.unitList = Object.keys(r.units).join(", "); return r; })
      .sort(function (a, b) { return b.total - a.total; });
  }

  // Payables from vendors with outstanding balances
  function payables() {
    return Store.list("vendors", { scope: "company" }).filter(function (v) { return (Number(v.outstanding) || 0) > 0; })
      .map(function (v) { return { name: v.name, phone: v.phone, email: v.email, total: Number(v.outstanding) || 0, ref: v.id, category: v.category }; })
      .sort(function (a, b) { return b.total - a.total; });
  }

  function reminderMsgReceivable(party) {
    var co = Store.currentCompany();
    var unit = party.unitList ? " against " + party.unitList : "";
    return "Dear " + party.name + ",\n\nGentle reminder from " + co.name + ": an amount of " + U.inr(party.total) +
      " is currently outstanding" + unit + (party.oldest ? " (due since " + U.fmtDate(party.oldest) + ")" : "") +
      ". Kindly arrange the payment at your earliest convenience.\n\nThank you,\n" + co.name;
  }
  function reminderMsgPayable(party) {
    var co = Store.currentCompany();
    return "Dear " + party.name + ",\n\nThis is " + co.name + ". Kindly share the pending invoice / account statement for the outstanding balance of " +
      U.inr(party.total) + " so we can process your payment.\n\nRegards,\n" + co.name;
  }

  function upiCfg() { return (Store.raw().meta.integrations || {}).upi || {}; }
  function upiLink(amount, note) {
    var u = upiCfg();
    return "upi://pay?pa=" + encodeURIComponent(u.vpa) + "&pn=" + encodeURIComponent(u.payeeName || Store.currentCompany().name) +
      "&am=" + (Number(amount) || 0).toFixed(2) + "&cu=INR&tn=" + encodeURIComponent(note || "");
  }
  function showUpi(party) {
    var cfg = upiCfg();
    if (!cfg.vpa) {
      U.confirmDialog("No UPI ID set yet. Open Settings to add your business UPI ID?", function () { App.route("settings"); }, "Open Settings");
      return;
    }
    var note = "Payment to " + (cfg.payeeName || Store.currentCompany().name) + (party.unitList ? " - " + party.unitList : "");
    var link = upiLink(party.total, note);
    var body = U.el("<div></div>");
    body.appendChild(U.el('<div class="spread" style="margin-bottom:12px"><div><div class="muted" style="font-size:12px">Amount</div><div style="font-size:24px;font-weight:800">' + U.inr(party.total) + '</div></div><div style="text-align:right"><div class="muted" style="font-size:12px">Pay to</div><b>' + U.esc(cfg.vpa) + "</b></div></div>"));
    var qrWrap = U.el('<div style="text-align:center;margin:10px 0"></div>');
    var qr = U.el('<img alt="UPI QR" width="220" height="220" style="border:1px solid var(--line);border-radius:10px;padding:6px;background:#fff">');
    qr.src = "https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=" + encodeURIComponent(link);
    qr.onerror = function () { qrWrap.innerHTML = '<div class="muted" style="font-size:12px">QR needs internet. Use the buttons below instead.</div>'; };
    qrWrap.appendChild(qr);
    qrWrap.appendChild(U.el('<div class="muted" style="font-size:12px;margin-top:6px">Customer scans with any UPI app (GPay / PhonePe / Paytm)</div>'));
    body.appendChild(qrWrap);

    var foot = U.el('<div class="row-flex" style="flex-wrap:wrap"></div>');
    var open = U.el('<a class="btn primary">📱 Open UPI app</a>'); open.href = link;
    var wa = U.el('<a class="btn" style="background:#25D366;border-color:#25D366;color:#fff" target="_blank">💬 Send link on WhatsApp</a>');
    var waMsg = "Dear " + party.name + ", please pay " + U.inr(party.total) + " to " + (cfg.payeeName || Store.currentCompany().name) +
      ".\nTap to pay via UPI: " + link + "\n(or pay to UPI ID: " + cfg.vpa + ")";
    wa.href = "https://wa.me/" + sanitizePhone(party.phone) + "?text=" + encodeURIComponent(waMsg);
    var copy = U.el('<button class="btn">📋 Copy link</button>');
    copy.onclick = function () { try { navigator.clipboard.writeText(link); U.Toast.show("UPI link copied", "good"); } catch (e) { U.Toast.show(link, ""); } };
    foot.appendChild(open); foot.appendChild(wa); foot.appendChild(copy);
    U.Modal.open("Collect via UPI — " + party.name, body, foot);
  }

  function actionButtons(party, kind) {
    var msg = kind === "receivable" ? reminderMsgReceivable(party) : reminderMsgPayable(party);
    var subject = kind === "receivable" ? "Payment Reminder — " + Store.currentCompany().name : "Invoice Request — " + Store.currentCompany().name;
    var box = U.el('<div class="row-flex" style="flex-wrap:wrap;gap:6px"></div>');
    var wa = U.el('<a class="btn sm" style="background:#25D366;border-color:#25D366;color:#fff" target="_blank">💬 WhatsApp</a>');
    wa.href = waLink(party.phone, msg);
    var sms = U.el('<a class="btn sm" target="_blank">✉️ SMS</a>'); sms.href = smsLink(party.phone, msg);
    var mail = U.el('<a class="btn sm" target="_blank">📧 Email</a>'); mail.href = mailLink(party.email, subject, msg);
    box.appendChild(wa); box.appendChild(sms); box.appendChild(mail);
    if (kind === "receivable") {
      var upi = U.el('<button class="btn sm" style="background:#5b21b6;border-color:#5b21b6;color:#fff">💳 UPI</button>');
      upi.onclick = function () { showUpi(party); };
      box.appendChild(upi);
      var rec = U.el('<button class="btn sm primary">✓ Receipt</button>');
      rec.onclick = function () { recordReceipt(party); };
      box.appendChild(rec);
    } else {
      var pay = U.el('<button class="btn sm primary">✓ Pay</button>');
      pay.onclick = function () { recordVendorPayment(party); };
      box.appendChild(pay);
    }
    return box;
  }

  function recordReceipt(party) {
    var built = U.buildForm([
      { f: "amount", label: "Amount received (₹)", type: "money", def: party.total, req: true },
      { f: "mode", label: "Mode", type: "select", options: ["NEFT", "RTGS", "UPI", "Cheque", "Cash", "Home Loan"], def: "UPI" },
      { f: "date", label: "Date", type: "date", def: Store.todayISO() }
    ], null, function (data) {
      var remaining = Number(data.amount) || 0;
      // settle this customer's due payments oldest-first
      Store.list("payments", { scope: "project" }).filter(function (p) { return p.customer === party.name && p.status !== "Paid"; })
        .sort(function (a, b) { return (a.dueDate || "") < (b.dueDate || "") ? -1 : 1; })
        .forEach(function (p) {
          if (remaining <= 0) return;
          var amt = Number(p.amount) || 0;
          if (remaining >= amt) { p.status = "Paid"; p.receivedDate = data.date; p.mode = data.mode; remaining -= amt; }
          else { p.amount = amt - remaining; p.status = "Partially Paid"; remaining = 0; }
        });
      Store.save();
      U.Modal.close(); U.Toast.show("Receipt of " + U.inr(data.amount) + " recorded for " + party.name, "good");
      App.route("collections");
    }, "Record Receipt");
    U.Modal.open("Record Receipt — " + party.name, built.form, built.foot);
  }

  function recordVendorPayment(party) {
    var built = U.buildForm([
      { f: "amount", label: "Amount paid (₹)", type: "money", def: party.total, req: true },
      { f: "mode", label: "Mode", type: "select", options: ["NEFT", "RTGS", "IMPS", "Cheque", "Cash"], def: "RTGS" },
      { f: "date", label: "Date", type: "date", def: Store.todayISO() }
    ], null, function (data) {
      var v = Store.get("vendors", party.ref);
      if (v) { v.outstanding = Math.max(0, (Number(v.outstanding) || 0) - (Number(data.amount) || 0)); Store.upsert("vendors", v, "company"); }
      U.Modal.close(); U.Toast.show("Payment of " + U.inr(data.amount) + " recorded to " + party.name, "good");
      App.route("collections");
    }, "Record Payment");
    U.Modal.open("Pay Vendor — " + party.name, built.form, built.foot);
  }

  function partyCard(party, kind) {
    var initials = (party.name || "?").split(" ").map(function (w) { return w[0]; }).slice(0, 2).join("").toUpperCase();
    var card = U.el('<div class="party-card"></div>');
    var top = U.el('<div class="party-top"></div>');
    top.appendChild(U.el('<div class="party-avatar">' + U.esc(initials) + "</div>"));
    var meta = U.el('<div class="party-meta"></div>');
    meta.appendChild(U.el('<div class="party-name">' + U.esc(party.name) + "</div>"));
    var subBits = [];
    if (party.phone) subBits.push("📱 " + U.esc(party.phone));
    if (kind === "receivable" && party.unitList) subBits.push(U.esc(party.unitList));
    if (kind === "payable" && party.category) subBits.push(U.esc(party.category));
    meta.appendChild(U.el('<div class="party-sub">' + (subBits.join(" • ") || "&nbsp;") + "</div>"));
    top.appendChild(meta);
    var amt = U.el('<div class="party-amt ' + (kind === "receivable" ? "get" : "give") + '"><div class="amt">' + U.inrShort(party.total) + '</div><div class="amt-lbl">' + (kind === "receivable" ? "to collect" : "to pay") + "</div></div>");
    top.appendChild(amt);
    card.appendChild(top);
    if (kind === "receivable" && party.oldest) {
      var dd = U.daysFromNow(party.oldest);
      card.appendChild(U.el('<div class="party-aging ' + (party.overdue ? "bad" : "") + '">' + (party.overdue ? "⚠ Overdue" : "Due") + " • oldest " + U.fmtDate(party.oldest) + (dd != null && dd < 0 ? " (" + Math.abs(dd) + " days late)" : "") + "</div>"));
    }
    card.appendChild(actionButtons(party, kind));
    return card;
  }

  function render(mount) {
    mount.innerHTML = "";
    mount.appendChild(U.pageHead("Collections & Reminders", "Party-wise outstanding with one-tap WhatsApp / SMS / Email reminders.  •  " + Store.currentCompany().name));

    var rec = receivables(), pay = payables();
    var totalGet = rec.reduce(function (s, r) { return s + r.total; }, 0);
    var totalGive = pay.reduce(function (s, r) { return s + r.total; }, 0);
    var overdueCount = rec.filter(function (r) { return r.overdue; }).length;

    var kpis = U.el('<div class="cards grid-3"></div>');
    kpis.appendChild(U.el('<div class="card kpi"><div class="kpi-icon" style="background:#e7f6ec">📥</div><div class="kpi-label">You\'ll Get (Receivables)</div><div class="kpi-value" style="color:#16a34a">' + U.inrShort(totalGet) + '</div><div class="kpi-sub">' + rec.length + ' parties • ' + overdueCount + ' overdue</div></div>'));
    kpis.appendChild(U.el('<div class="card kpi"><div class="kpi-icon" style="background:#fbe9e9">📤</div><div class="kpi-label">You\'ll Pay (Payables)</div><div class="kpi-value" style="color:#dc2626">' + U.inrShort(totalGive) + '</div><div class="kpi-sub">' + pay.length + ' vendors</div></div>'));
    var net = totalGet - totalGive;
    kpis.appendChild(U.el('<div class="card kpi"><div class="kpi-icon" style="background:#e8f0fe">⚖️</div><div class="kpi-label">Net Position</div><div class="kpi-value" style="color:' + (net >= 0 ? "#16a34a" : "#dc2626") + '">' + U.inrShort(Math.abs(net)) + '</div><div class="kpi-sub">' + (net >= 0 ? "net inflow expected" : "net outflow expected") + '</div></div>'));
    mount.appendChild(kpis);

    mount.appendChild(U.el('<div class="notice"><span class="ni">💬</span><div>Tapping <b>WhatsApp</b> opens WhatsApp (Web or the phone app) with the reminder pre-filled — this works for real, no setup needed. SMS/Email open your phone\'s default apps.</div></div>'));

    // segmented control
    var seg = U.el('<div class="seg" style="margin:4px 0 14px"><button class="active" data-k="receivable">📥 To Collect (' + rec.length + ')</button><button data-k="payable">📤 To Pay (' + pay.length + ')</button></div>');
    mount.appendChild(seg);
    var listHost = U.el('<div class="party-grid"></div>');
    mount.appendChild(listHost);

    function drawList(kind) {
      listHost.innerHTML = "";
      var data = kind === "receivable" ? rec : pay;
      if (!data.length) { listHost.appendChild(U.el('<div class="empty-state"><div class="big">🎉</div><div>Nothing ' + (kind === "receivable" ? "to collect" : "to pay") + " right now.</div></div>")); return; }
      data.forEach(function (p) { listHost.appendChild(partyCard(p, kind)); });
    }
    drawList("receivable");
    seg.querySelectorAll("button").forEach(function (b) {
      b.onclick = function () { seg.querySelectorAll("button").forEach(function (x) { x.classList.remove("active"); }); b.classList.add("active"); drawList(b.getAttribute("data-k")); };
    });
  }

  global.Collections = { render: render, waLink: waLink, showUpi: showUpi };
})(window);

</script>
  <script>
/* AtriaERP — Reports & MIS (In4Suite/Farvision-style) + Approvals inbox (Pazy-style) */
(function (global) {
  "use strict";
  var U = global.UI;

  /* ---------- helpers ---------- */
  function csvDownload(name, headers, rows) {
    var esc = function (v) { v = v == null ? "" : String(v); return /[",\n]/.test(v) ? '"' + v.replace(/"/g, '""') + '"' : v; };
    var lines = [headers.map(esc).join(",")].concat(rows.map(function (r) { return r.map(esc).join(","); }));
    var blob = new Blob([lines.join("\n")], { type: "text/csv" });
    var a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = name + "-" + Store.todayISO() + ".csv"; a.click();
    U.Toast.show("CSV exported", "good");
  }

  function reportTable(headers, rows, opts) {
    opts = opts || {};
    var wrap = U.el('<div class="table-wrap" id="reportTable"></div>');
    var table = U.el('<table class="data"></table>');
    var thead = U.el("<thead><tr></tr></thead>"); var htr = thead.querySelector("tr");
    headers.forEach(function (h, i) { htr.appendChild(U.el('<th class="' + (opts.num && opts.num.indexOf(i) >= 0 ? "num" : "") + '">' + U.esc(h) + "</th>")); });
    table.appendChild(thead);
    var tb = U.el("<tbody></tbody>");
    rows.forEach(function (r, ri) {
      var isTotal = opts.totalRow && ri === rows.length - 1;
      var tr = U.el('<tr' + (isTotal ? ' style="font-weight:700;background:var(--panel-2)"' : "") + "></tr>");
      r.forEach(function (cell, i) { tr.appendChild(U.el('<td class="' + (opts.num && opts.num.indexOf(i) >= 0 ? "num" : "") + '">' + (cell == null ? "—" : U.esc(cell)) + "</td>")); });
      tb.appendChild(tr);
    });
    table.appendChild(tb); wrap.appendChild(table);
    return wrap;
  }

  function ageBucket(dueISO) {
    var dd = U.daysFromNow(dueISO);
    if (dd == null) return "Unknown";
    if (dd >= 0) return "Not Due";
    var od = -dd;
    if (od <= 30) return "0-30";
    if (od <= 60) return "31-60";
    if (od <= 90) return "61-90";
    return "90+";
  }
  var BUCKETS = ["Not Due", "0-30", "31-60", "61-90", "90+"];

  /* ---------- individual reports: return {headers, rows, opts, raw} ---------- */
  function repSalesMIS() {
    var rows = [], tU = 0, tA = 0, tB = 0, tV = 0;
    Store.listProjects().forEach(function (pr) {
      var units = (Store.raw().records.units || []).filter(function (u) { return u.projectId === pr.id; });
      var avail = units.filter(function (u) { return u.status === "Available"; }).length;
      var booked = units.filter(function (u) { return ["Booked", "Sold", "Registered"].indexOf(u.status) >= 0; });
      var value = booked.reduce(function (s, u) { return s + (Number(u.price) || 0); }, 0);
      rows.push([pr.name, units.length, avail, booked.length, U.inrShort(value)]);
      tU += units.length; tA += avail; tB += booked.length; tV += value;
    });
    rows.push(["TOTAL", tU, tA, tB, U.inrShort(tV)]);
    return { title: "Sales MIS (by project)", headers: ["Project", "Total Units", "Available", "Booked/Sold", "Sales Value"], rows: rows, opts: { num: [1, 2, 3, 4], totalRow: true } };
  }

  function repReceivablesAging() {
    var map = {};
    (Store.raw().records.payments || []).filter(function (p) { return p.companyId === Store.getContext().companyId && p.status !== "Paid"; })
      .forEach(function (p) {
        var k = p.customer || "(unknown)";
        if (!map[k]) { map[k] = { name: k }; BUCKETS.forEach(function (b) { map[k][b] = 0; }); map[k].total = 0; }
        var b = ageBucket(p.dueDate); var amt = Number(p.amount) || 0;
        map[k][b] += amt; map[k].total += amt;
      });
    var rows = [], totals = {}; BUCKETS.forEach(function (b) { totals[b] = 0; }); var gt = 0;
    Object.keys(map).forEach(function (k) {
      var r = map[k]; rows.push([r.name].concat(BUCKETS.map(function (b) { return r[b] ? U.inrShort(r[b]) : "—"; })).concat([U.inrShort(r.total)]));
      BUCKETS.forEach(function (b) { totals[b] += r[b]; }); gt += r.total;
    });
    rows.push(["TOTAL"].concat(BUCKETS.map(function (b) { return U.inrShort(totals[b]); })).concat([U.inrShort(gt)]));
    return { title: "Receivables Aging", headers: ["Customer"].concat(BUCKETS).concat(["Total"]), rows: rows, opts: { num: [1, 2, 3, 4, 5, 6], totalRow: true } };
  }

  function repPayablesAging() {
    var rows = [], totals = { "0-30": 0, "31-60": 0, "61-90": 0, "90+": 0 }, gt = 0;
    (Store.raw().records.creditors || []).filter(function (c) { return c.companyId === Store.getContext().companyId; }).forEach(function (c) {
      var age = Number(c.ageDays) || 0; var amt = Number(c.outstanding) || 0;
      var b = age <= 30 ? "0-30" : age <= 60 ? "31-60" : age <= 90 ? "61-90" : "90+";
      var cells = ["0-30", "31-60", "61-90", "90+"].map(function (x) { return x === b ? U.inrShort(amt) : "—"; });
      rows.push([c.name].concat(cells).concat([U.inrShort(amt)]));
      totals[b] += amt; gt += amt;
    });
    rows.push(["TOTAL"].concat(["0-30", "31-60", "61-90", "90+"].map(function (b) { return U.inrShort(totals[b]); })).concat([U.inrShort(gt)]));
    return { title: "Payables Aging (Creditors)", headers: ["Creditor", "0-30", "31-60", "61-90", "90+", "Total"], rows: rows, opts: { num: [1, 2, 3, 4, 5], totalRow: true } };
  }

  function repInventory() {
    var pr = Store.currentProject();
    var units = (Store.raw().records.units || []).filter(function (u) { return pr && u.projectId === pr.id; });
    var types = {}, statuses = ["Available", "Blocked", "Booked", "Sold", "Registered"];
    units.forEach(function (u) { types[u.type] = types[u.type] || {}; types[u.type][u.status] = (types[u.type][u.status] || 0) + 1; });
    var rows = [];
    Object.keys(types).forEach(function (t) {
      var row = [t]; var tot = 0; statuses.forEach(function (s) { var c = types[t][s] || 0; row.push(c || "—"); tot += c; }); row.push(tot); rows.push(row);
    });
    var totRow = ["TOTAL"]; statuses.forEach(function (s) { totRow.push(units.filter(function (u) { return u.status === s; }).length); }); totRow.push(units.length);
    rows.push(totRow);
    return { title: "Inventory Analysis" + (pr ? " — " + pr.name : ""), headers: ["Type"].concat(statuses).concat(["Total"]), rows: rows, opts: { num: [1, 2, 3, 4, 5, 6], totalRow: true } };
  }

  function repTax() {
    var cid = Store.getContext().companyId;
    var gst = (Store.raw().records.gst || []).filter(function (g) { return g.companyId === cid; });
    var output = gst.filter(function (g) { return g.type === "Output"; }).reduce(function (s, g) { return s + (Number(g.cgst) || 0) + (Number(g.sgst) || 0) + (Number(g.igst) || 0); }, 0);
    var input = gst.filter(function (g) { return g.type === "Input"; }).reduce(function (s, g) { return s + (Number(g.cgst) || 0) + (Number(g.sgst) || 0) + (Number(g.igst) || 0); }, 0);
    var tds = (Store.raw().records.tds || []).filter(function (t) { return t.companyId === cid; });
    var tdsDed = tds.reduce(function (s, t) { return s + (Number(t.tdsAmount) || 0); }, 0);
    var tdsPend = tds.filter(function (t) { return t.challanStatus !== "Deposited"; }).reduce(function (s, t) { return s + (Number(t.tdsAmount) || 0); }, 0);
    var rows = [
      ["GST Output (collected)", U.inr(output)],
      ["GST Input (credit)", U.inr(input)],
      ["Net GST Payable", U.inr(output - input)],
      ["TDS Deducted (total)", U.inr(tdsDed)],
      ["TDS Pending Deposit", U.inr(tdsPend)]
    ];
    return { title: "Tax Summary (GST & TDS)", headers: ["Particulars", "Amount"], rows: rows, opts: { num: [1] } };
  }

  var REPORTS = { sales: repSalesMIS, receivables: repReceivablesAging, payables: repPayablesAging, inventory: repInventory, tax: repTax };
  var REPORT_LABELS = [["sales", "Sales MIS"], ["receivables", "Receivables Aging"], ["payables", "Payables Aging"], ["inventory", "Inventory"], ["tax", "Tax Summary"]];

  function renderReports(mount) {
    mount.innerHTML = "";
    mount.appendChild(U.pageHead("Reports & MIS", "Management reports from your live data.  •  " + Store.currentCompany().name));
    var state = { cur: "sales" };

    var bar = U.el('<div class="toolbar"></div>');
    var seg = U.el('<div class="seg"></div>');
    REPORT_LABELS.forEach(function (r) { var b = U.el('<button data-r="' + r[0] + '"' + (r[0] === state.cur ? ' class="active"' : "") + ">" + r[1] + "</button>"); seg.appendChild(b); });
    bar.appendChild(seg);
    var spacer = U.el('<div style="margin-left:auto" class="row-flex"></div>');
    var csvBtn = U.el('<button class="btn sm">⬇ CSV</button>');
    var printBtn = U.el('<button class="btn sm">🖨 Print</button>');
    spacer.appendChild(csvBtn); spacer.appendChild(printBtn); bar.appendChild(spacer);
    mount.appendChild(bar);

    var host = U.el('<div id="reportArea"></div>');
    mount.appendChild(host);

    function draw() {
      var rep = REPORTS[state.cur]();
      host.innerHTML = "";
      host.appendChild(U.el('<h3 style="margin:4px 0 12px">' + U.esc(rep.title) + ' <span class="muted" style="font-weight:400;font-size:12px">as on ' + U.fmtDate(Store.todayISO()) + "</span></h3>"));
      host.appendChild(reportTable(rep.headers, rep.rows, rep.opts));
      csvBtn.onclick = function () { csvDownload(rep.title.replace(/[^a-z0-9]+/gi, "-").toLowerCase(), rep.headers, rep.rows); };
      printBtn.onclick = function () { window.print(); };
      seg.querySelectorAll("button").forEach(function (b) { b.classList.toggle("active", b.getAttribute("data-r") === state.cur); });
    }
    seg.querySelectorAll("button").forEach(function (b) { b.onclick = function () { state.cur = b.getAttribute("data-r"); draw(); }; });
    draw();
  }

  /* ---------- Approvals inbox (Pazy-style) ---------- */
  function pendingItems() {
    var cid = Store.getContext().companyId, items = [];
    (Store.raw().records.reimbursements || []).filter(function (r) { return r.companyId === cid && r.status === "Pending"; })
      .forEach(function (r) { items.push({ kind: "Reimbursement", entity: "reimbursements", id: r.id, who: r.claimant, what: r.category, amount: r.amount, next: "Approved", row: r, field: "status" }); });
    (Store.raw().records.payroll || []).filter(function (r) { return r.companyId === cid && r.status === "Pending"; })
      .forEach(function (r) { items.push({ kind: "Payroll", entity: "payroll", id: r.id, who: r.name, what: r.designation, amount: r.netPay, next: "Processed", row: r, field: "status" }); });
    (Store.raw().records.purchases || []).filter(function (r) { return r.companyId === cid && r.status === "Draft"; })
      .forEach(function (r) { items.push({ kind: "Purchase Order", entity: "purchases", id: r.id, who: r.vendor, what: r.item || r.poNo, amount: r.amount, next: "Ordered", row: r, field: "status" }); });
    return items;
  }

  function renderApprovals(mount) {
    mount.innerHTML = "";
    mount.appendChild(U.pageHead("Approvals Inbox", "Pending items awaiting your approval across the company."));
    var items = pendingItems();
    var totalAmt = items.reduce(function (s, i) { return s + (Number(i.amount) || 0); }, 0);
    var kpis = U.el('<div class="cards grid-3"></div>');
    kpis.appendChild(U.kpiCard("Pending Approvals", items.length, "items in queue", "📨"));
    kpis.appendChild(U.kpiCard("Value Pending", U.inrShort(totalAmt), "total amount", "💸"));
    kpis.appendChild(U.kpiCard("Types", new Set(items.map(function (i) { return i.kind; })).size, "categories", "🗂️"));
    mount.appendChild(kpis);

    if (!items.length) { mount.appendChild(U.el('<div class="empty-state"><div class="big">✅</div><div>All caught up — nothing pending approval.</div></div>')); return; }

    var wrap = U.el('<div class="table-wrap" style="margin-top:16px"></div>');
    var table = U.el('<table class="data"></table>');
    table.appendChild(U.el('<thead><tr><th>Type</th><th>Party</th><th>Details</th><th class="num">Amount</th><th class="num">Action</th></tr></thead>'));
    var tb = U.el("<tbody></tbody>");
    items.forEach(function (it) {
      var tr = U.el("<tr></tr>");
      tr.appendChild(U.el('<td><span class="badge info">' + U.esc(it.kind) + "</span></td>"));
      tr.appendChild(U.el("<td>" + U.esc(it.who || "—") + "</td>"));
      tr.appendChild(U.el('<td class="muted">' + U.esc(it.what || "—") + "</td>"));
      tr.appendChild(U.el('<td class="num">' + U.inr(it.amount) + "</td>"));
      var act = U.el('<td class="num"><div class="row-actions"></div></td>'); var box = act.querySelector(".row-actions");
      var ap = U.el('<button class="btn sm primary">✓ Approve</button>');
      ap.onclick = function () { it.row[it.field] = it.next; Store.upsert(it.entity, it.row, "company"); U.Toast.show(it.kind + " approved", "good"); renderApprovals(mount); };
      var rj = U.el('<button class="btn sm danger">✕ Reject</button>');
      rj.onclick = function () { it.row[it.field] = it.kind === "Purchase Order" ? "Cancelled" : "Rejected"; Store.upsert(it.entity, it.row, "company"); U.Toast.show(it.kind + " rejected", "bad"); renderApprovals(mount); };
      box.appendChild(ap); box.appendChild(rj); tr.appendChild(act);
      tb.appendChild(tr);
    });
    table.appendChild(tb); wrap.appendChild(table); mount.appendChild(wrap);
  }

  global.Reports = { renderReports: renderReports, renderApprovals: renderApprovals };
})(window);

</script>
  <script>
/* AtriaERP — Extra modules:
 *  • Customer 360  (lead → unit → agreement → payments → letters, unified)
 *  • Budget vs Actual (project cost control, Farvision-style)
 *  • Land Desk (In4Suite-style land schedules + litigation + reminders)
 *  • Document Vault (file attachments, stored locally as data URLs)
 */
(function (global) {
  "use strict";
  var U = global.UI;
  function cid() { return Store.getContext().companyId; }
  function pid() { return Store.getContext().projectId; }
  function byCompany(entity) { return (Store.raw().records[entity] || []).filter(function (r) { return r.companyId === cid(); }); }

  /* ============================ Customer 360 ============================ */
  function customerNames() {
    var set = {};
    byCompany("leads").forEach(function (r) { if (r.name) set[r.name] = 1; });
    byCompany("agreements").forEach(function (r) { if (r.customer) set[r.customer] = 1; });
    byCompany("payments").forEach(function (r) { if (r.customer) set[r.customer] = 1; });
    return Object.keys(set).sort();
  }

  function renderCustomer360(mount) {
    mount.innerHTML = "";
    mount.appendChild(U.pageHead("Customer 360", "Everything about one customer — bookings, agreements, payments & letters in one place."));
    var names = customerNames();
    if (!names.length) { mount.appendChild(U.el('<div class="empty-state"><div class="big">👤</div><div>No customers yet. Add leads, agreements or payments first.</div></div>')); return; }

    var bar = U.el('<div class="toolbar"></div>');
    var sel = U.el('<select style="min-width:240px"></select>');
    names.forEach(function (n) { sel.appendChild(U.el("<option>" + U.esc(n) + "</option>")); });
    bar.appendChild(U.el('<div class="muted">Customer:</div>')); bar.appendChild(sel);
    mount.appendChild(bar);
    var host = U.el("<div></div>"); mount.appendChild(host);

    function draw(name) {
      host.innerHTML = "";
      var lead = byCompany("leads").find(function (r) { return r.name === name; }) || {};
      var ags = byCompany("agreements").filter(function (r) { return r.customer === name; });
      var pays = byCompany("payments").filter(function (r) { return r.customer === name; });
      var lets = byCompany("letters").filter(function (r) { return r.recipient === name; });
      var agValue = ags.reduce(function (s, r) { return s + (Number(r.value) || 0); }, 0);
      var received = pays.filter(function (p) { return p.status === "Paid"; }).reduce(function (s, p) { return s + (Number(p.amount) || 0); }, 0);
      var outstanding = pays.filter(function (p) { return p.status !== "Paid"; }).reduce(function (s, p) { return s + (Number(p.amount) || 0); }, 0);
      var units = {}; ags.forEach(function (a) { if (a.unit) units[a.unit] = 1; }); pays.forEach(function (p) { if (p.unit) units[p.unit] = 1; });

      // header card
      var initials = name.split(" ").map(function (w) { return w[0]; }).slice(0, 2).join("").toUpperCase();
      var head = U.el('<div class="card"><div class="party-top"><div class="party-avatar">' + U.esc(initials) + '</div><div class="party-meta"><div class="party-name" style="font-size:18px">' + U.esc(name) + '</div><div class="party-sub">' + (lead.phone ? "📱 " + U.esc(lead.phone) + "  " : "") + (lead.email ? "✉️ " + U.esc(lead.email) + "  " : "") + (lead.stage ? '<span class="badge info">' + U.esc(lead.stage) + "</span>" : "") + " " + Object.keys(units).map(function (u) { return '<span class="pill">' + U.esc(u) + "</span>"; }).join(" ") + "</div></div></div></div>");
      if (lead.phone) {
        var wa = U.el('<a class="btn sm" style="background:#25D366;border-color:#25D366;color:#fff;margin-top:10px" target="_blank">💬 Message on WhatsApp</a>');
        wa.href = Collections.waLink(lead.phone, "Dear " + name + ", warm greetings from " + Store.currentCompany().name + ".");
        head.appendChild(wa);
      }
      host.appendChild(head);

      var kpis = U.el('<div class="cards grid-3" style="margin-top:14px"></div>');
      kpis.appendChild(U.kpiCard("Agreement Value", U.inrShort(agValue), ags.length + " agreement(s)", "📄"));
      kpis.appendChild(U.kpiCard("Received", U.inrShort(received), pays.filter(function (p) { return p.status === "Paid"; }).length + " receipt(s)", "✅"));
      kpis.appendChild(U.kpiCard("Outstanding", U.inrShort(outstanding), "due / overdue", "⏳"));
      host.appendChild(kpis);

      var grid = U.el('<div class="cards grid-2" style="margin-top:16px"></div>');
      grid.appendChild(sectionCard("📄 Agreements", ags, ["agreementNo", "unit", "value", "registrationStatus"], { value: "money" }));
      grid.appendChild(sectionCard("💰 Payments", pays, ["milestone", "amount", "dueDate", "status"], { amount: "money", dueDate: "date" }));
      grid.appendChild(sectionCard("✉️ Letters", lets, ["type", "refNo", "issueDate", "status"], { issueDate: "date" }));
      // timeline
      var tl = U.el('<div class="card"><h3>🕑 Timeline</h3><div class="timeline"></div></div>');
      var events = [];
      ags.forEach(function (a) { events.push({ d: a.agreementDate || a.createdAt, t: "Agreement " + (a.agreementNo || "") + " — " + U.inrShort(a.value) }); });
      pays.forEach(function (p) { events.push({ d: p.receivedDate || p.dueDate || p.createdAt, t: (p.status === "Paid" ? "Received " : "Due ") + U.inrShort(p.amount) + " (" + (p.milestone || "") + ")" }); });
      lets.forEach(function (l) { events.push({ d: l.issueDate || l.createdAt, t: "Letter: " + l.type }); });
      if (lead.createdAt) events.push({ d: lead.createdAt, t: "Lead created (" + (lead.source || "") + ")" });
      events.sort(function (a, b) { return (b.d || "") < (a.d || "") ? -1 : 1; });
      var tlBox = tl.querySelector(".timeline");
      events.forEach(function (e) { tlBox.appendChild(U.el('<div class="tl-item"><div>' + U.esc(e.t) + '</div><small>' + U.fmtDate(e.d) + "</small></div>")); });
      if (!events.length) tlBox.appendChild(U.el('<div class="muted">No activity.</div>'));
      grid.appendChild(tl);
      host.appendChild(grid);
    }
    sel.onchange = function () { draw(sel.value); };
    draw(names[0]);
  }

  function sectionCard(title, rows, cols, types) {
    var card = U.el('<div class="card"><h3>' + title + " <span class='muted' style='font-weight:400;font-size:12px'>(" + rows.length + ")</span></h3></div>");
    if (!rows.length) { card.appendChild(U.el('<div class="muted">None.</div>')); return card; }
    var t = U.el('<table class="data" style="border:1px solid var(--line);border-radius:8px;overflow:hidden"></table>');
    var tb = U.el("<tbody></tbody>");
    rows.forEach(function (r) {
      var tr = U.el("<tr></tr>");
      cols.forEach(function (c) {
        var ty = types && types[c];
        var val = ty ? U.fmtCell(r[c], { type: ty }) : U.esc(r[c] == null ? "—" : r[c]);
        tr.appendChild(U.el('<td class="' + (ty === "money" ? "num" : "") + '">' + val + "</td>"));
      });
      tb.appendChild(tr);
    });
    t.appendChild(tb); card.appendChild(t); return card;
  }

  /* ============================ Budget vs Actual ============================ */
  var DEFAULT_HEADS = ["Land & Approvals", "Civil / RCC", "MEP (Plumbing/Electrical)", "Finishing", "Lifts & Amenities", "Overheads & Marketing"];

  function renderBudget(mount) {
    mount.innerHTML = "";
    var pr = Store.currentProject();
    mount.appendChild(U.pageHead("Budget vs Actual", "Project cost control" + (pr ? " — " + pr.name : "")));
    if (!pr) { mount.appendChild(U.el('<div class="notice warn"><span class="ni">⚠️</span><div>Select a project to manage its budget.</div></div>')); return; }

    var heads = (Store.raw().records.budgets || []).filter(function (b) { return b.projectId === pr.id; });
    var committedPO = (Store.raw().records.purchases || []).filter(function (r) { return r.projectId === pr.id; }).reduce(function (s, r) { return s + (Number(r.amount) || 0); }, 0);
    var committedWO = (Store.raw().records.workorders || []).filter(function (r) { return r.projectId === pr.id; }).reduce(function (s, r) { return s + (Number(r.value) || 0); }, 0);

    var addBtn = U.el('<button class="btn primary">+ Add Head</button>');
    addBtn.onclick = function () { editHead(null); };
    var bar = U.el('<div class="toolbar"></div>');
    bar.appendChild(U.el('<div class="muted">Committed from POs + Work Orders: <b>' + U.inr(committedPO + committedWO) + "</b></div>"));
    var sp = U.el('<div style="margin-left:auto" class="row-flex"></div>');
    if (!heads.length) { var seed = U.el('<button class="btn sm">Set up default heads</button>'); seed.onclick = seedHeads; sp.appendChild(seed); }
    sp.appendChild(addBtn); bar.appendChild(sp); mount.appendChild(bar);

    function seedHeads() { DEFAULT_HEADS.forEach(function (h) { Store.upsert("budgets", { head: h, budgetAmount: 0, actualAmount: 0, projectId: pr.id }, "project"); }); U.Toast.show("Default heads added", "good"); renderBudget(mount); }
    function editHead(row) {
      var built = U.buildForm([
        { f: "head", label: "Budget head", type: "text", req: true },
        { f: "budgetAmount", label: "Budget (₹)", type: "money" },
        { f: "actualAmount", label: "Actual spent (₹)", type: "money" },
        { f: "remarks", label: "Remarks", type: "text", full: true }
      ], row, function (data) { data.projectId = pr.id; Store.upsert("budgets", data, "project"); U.Modal.close(); renderBudget(mount); }, row ? "Update" : "Add Head");
      U.Modal.open(row ? "Edit Head" : "New Budget Head", built.form, built.foot);
    }

    if (!heads.length) { mount.appendChild(U.el('<div class="empty-state"><div class="big">💹</div><div>No budget set. Click “Set up default heads” to start.</div></div>')); return; }

    var tB = 0, tA = 0;
    var wrap = U.el('<div class="table-wrap"></div>');
    var table = U.el('<table class="data"></table>');
    table.appendChild(U.el('<thead><tr><th>Head</th><th class="num">Budget</th><th class="num">Actual</th><th class="num">Variance</th><th style="width:180px">Used</th><th class="num">Actions</th></tr></thead>'));
    var tb = U.el("<tbody></tbody>");
    heads.forEach(function (h) {
      var b = Number(h.budgetAmount) || 0, a = Number(h.actualAmount) || 0; tB += b; tA += a;
      var pct = b ? Math.min(100, Math.round(a / b * 100)) : 0;
      var over = a > b && b > 0;
      var tr = U.el("<tr></tr>");
      tr.appendChild(U.el("<td><b>" + U.esc(h.head) + "</b></td>"));
      tr.appendChild(U.el('<td class="num">' + U.inr(b) + "</td>"));
      tr.appendChild(U.el('<td class="num">' + U.inr(a) + "</td>"));
      tr.appendChild(U.el('<td class="num" style="color:' + (b - a < 0 ? "var(--bad)" : "var(--good)") + '">' + U.inr(b - a) + "</td>"));
      tr.appendChild(U.el('<td><div class="progress"><span style="width:' + pct + '%;background:' + (over ? "var(--bad)" : "var(--brand)") + '"></span></div><small class="muted">' + pct + "%</small></td>"));
      var act = U.el('<td class="num"><div class="row-actions"></div></td>'); var box = act.querySelector(".row-actions");
      var ed = U.el('<button class="btn sm">Edit</button>'); ed.onclick = function () { editHead(h); };
      var del = U.el('<button class="btn sm danger">×</button>'); del.onclick = function () { Store.remove("budgets", h.id); renderBudget(mount); };
      box.appendChild(ed); box.appendChild(del); tr.appendChild(act);
      tb.appendChild(tr);
    });
    var pctT = tB ? Math.min(100, Math.round(tA / tB * 100)) : 0;
    tb.appendChild(U.el('<tr style="font-weight:700;background:var(--panel-2)"><td>TOTAL</td><td class="num">' + U.inr(tB) + '</td><td class="num">' + U.inr(tA) + '</td><td class="num">' + U.inr(tB - tA) + '</td><td><div class="progress"><span style="width:' + pctT + '%"></span></div><small class="muted">' + pctT + '% used</small></td><td></td></tr>'));
    table.appendChild(tb); wrap.appendChild(table); mount.appendChild(wrap);
  }

  /* ============================ Land Desk ============================ */
  function renderLandDesk(mount) {
    mount.innerHTML = "";
    mount.appendChild(U.pageHead("Land Desk", "Land parcels with payment schedules, litigation & reminders.  •  " + Store.currentCompany().name));
    var parcels = byCompany("land");
    if (!parcels.length) { mount.appendChild(U.el('<div class="empty-state"><div class="big">🗺️</div><div>No land parcels. Add them under Legal & Land → Land Management.</div></div>')); return; }

    // upcoming reminders
    var rem = [];
    parcels.forEach(function (p) { var dd = U.daysFromNow(p.reminderDate); if (dd != null && dd <= 30) rem.push({ p: p, dd: dd }); });
    byCompany("liaisoning").forEach(function (l) { var dd = U.daysFromNow(l.nextFollowUp); if (dd != null && dd <= 30) rem.push({ liaison: l, dd: dd }); });
    if (rem.length) {
      var note = U.el('<div class="notice warn"><span class="ni">⏰</span><div><b>Upcoming actions:</b> ' + rem.sort(function (a, b) { return a.dd - b.dd; }).map(function (r) {
        return r.p ? (U.esc(r.p.parcel) + " (" + U.fmtDate(r.p.reminderDate) + ")") : ("Liaison: " + U.esc(r.liaison.approval) + " (" + U.fmtDate(r.liaison.nextFollowUp) + ")");
      }).join(" • ") + "</div></div>");
      mount.appendChild(note);
    }

    var grid = U.el('<div class="cards grid-2"></div>');
    parcels.forEach(function (p) {
      var sched = p.schedule || [];
      var paidFromSched = sched.filter(function (s) { return s.paid; }).reduce(function (a, s) { return a + (Number(s.amount) || 0); }, 0);
      var paid = sched.length ? paidFromSched : (Number(p.amountPaid) || 0);
      var total = Number(p.totalConsideration) || 0;
      var bal = total - paid;
      var litCls = { None: "good", Pending: "bad", Resolved: "info" }[p.litigation] || "muted";
      var card = U.el('<div class="card"></div>');
      card.appendChild(U.el('<div class="spread"><div><h3 style="margin:0">🗺️ ' + U.esc(p.parcel) + '</h3><div class="muted" style="font-size:12px">' + U.esc(p.village || "") + ' • ' + U.esc(p.surveyNo || "") + ' • ' + (p.area || "—") + ' acre</div></div><span class="badge info">' + U.esc(p.stage || "—") + '</span></div>'));
      card.appendChild(U.el('<div class="stat-line"><span>Consideration</span><b>' + U.inr(total) + "</b></div>"));
      card.appendChild(U.el('<div class="stat-line"><span>Paid</span><b style="color:var(--good)">' + U.inr(paid) + "</b></div>"));
      card.appendChild(U.el('<div class="stat-line"><span>Balance</span><b style="color:var(--bad)">' + U.inr(bal) + "</b></div>"));
      if (total) { var pct = Math.min(100, Math.round(paid / total * 100)); card.appendChild(U.el('<div class="progress" style="margin:8px 0"><span style="width:' + pct + '%;background:var(--good)"></span></div>')); }
      card.appendChild(U.el('<div class="row-flex" style="margin:8px 0"><span class="badge ' + litCls + '">Litigation: ' + U.esc(p.litigation || "None") + '</span>' + (p.courtRef ? '<span class="pill">CNR ' + U.esc(p.courtRef) + "</span>" : "") + (p.reminderDate ? '<span class="pill">⏰ ' + U.fmtDate(p.reminderDate) + "</span>" : "") + "</div>"));
      var actRow = U.el('<div class="row-flex" style="flex-wrap:wrap"></div>');
      var editB = U.el('<button class="btn sm">✎ Edit</button>');
      editB.onclick = function () {
        var built = U.buildForm(Schema.ENTITIES.land.fields, p, function (data) {
          data.id = p.id; Store.upsert("land", data, "company"); U.Modal.close(); U.Toast.show("Parcel updated", "good"); renderLandDesk(mount);
        }, "Update Parcel");
        U.Modal.open("Edit Parcel — " + p.parcel, built.form, built.foot);
      };
      var btn = U.el('<button class="btn sm primary">🗓 Payment Schedule (' + sched.length + ")</button>");
      btn.onclick = function () { openSchedule(p, mount); };
      actRow.appendChild(editB); actRow.appendChild(btn);
      card.appendChild(actRow);
      grid.appendChild(card);
    });
    mount.appendChild(grid);
  }

  function openSchedule(parcel, mount) {
    var body = U.el("<div></div>");
    function redraw() {
      body.innerHTML = "";
      var sched = parcel.schedule || [];
      if (!sched.length) body.appendChild(U.el('<div class="muted" style="margin-bottom:10px">No installments yet.</div>'));
      sched.forEach(function (s, i) {
        var row = U.el('<div class="spread" style="padding:8px 0;border-bottom:1px solid var(--line)"><div><b>' + U.esc(s.label || "Installment " + (i + 1)) + '</b><div class="muted" style="font-size:12px">' + U.inr(s.amount) + " • " + U.fmtDate(s.dueDate) + "</div></div></div>");
        var rt = U.el('<div class="row-flex"></div>');
        var tog = U.el('<button class="btn sm ' + (s.paid ? "" : "primary") + '">' + (s.paid ? "✓ Paid" : "Mark Paid") + "</button>");
        tog.onclick = function () { s.paid = !s.paid; persist(); redraw(); };
        var del = U.el('<button class="btn sm danger">×</button>'); del.onclick = function () { sched.splice(i, 1); persist(); redraw(); };
        rt.appendChild(tog); rt.appendChild(del); row.appendChild(rt); body.appendChild(row);
      });
      var addForm = U.el('<div class="form-grid" style="margin-top:14px"><div class="field"><label>Label</label><input id="sl" placeholder="e.g. On Agreement"></div><div class="field"><label>Amount (₹)</label><input id="sa" type="number"></div><div class="field"><label>Due date</label><input id="sd" type="date"></div></div>');
      body.appendChild(addForm);
      var add = U.el('<button class="btn primary" style="margin-top:6px">+ Add Installment</button>');
      add.onclick = function () {
        var l = addForm.querySelector("#sl").value, a = Number(addForm.querySelector("#sa").value) || 0, d = addForm.querySelector("#sd").value;
        if (!a) { U.Toast.show("Enter an amount", "bad"); return; }
        (parcel.schedule = parcel.schedule || []).push({ label: l, amount: a, dueDate: d, paid: false }); persist(); redraw();
      };
      body.appendChild(add);
    }
    function persist() {
      parcel.amountPaid = (parcel.schedule || []).filter(function (s) { return s.paid; }).reduce(function (a, s) { return a + (Number(s.amount) || 0); }, 0);
      Store.upsert("land", parcel, "company");
    }
    redraw();
    var foot = U.el('<div class="row-flex"></div>'); var close = U.el('<button class="btn primary">Done</button>'); close.onclick = function () { U.Modal.close(); renderLandDesk(mount); }; foot.appendChild(close);
    U.Modal.open("Payment Schedule — " + parcel.parcel, body, foot);
  }

  /* ============================ Document Vault ============================ */
  var MAX_BYTES = 1.5 * 1024 * 1024;
  function renderDocuments(mount) {
    mount.innerHTML = "";
    mount.appendChild(U.pageHead("Document Vault", "Attach agreements, plans, 7/12 extracts, site photos & legal docs."));
    mount.appendChild(U.el('<div class="notice"><span class="ni">📎</span><div>Files are stored on this device (up to ~1.5 MB each). For large files & team-wide access, switch on cloud mode — then this becomes shared cloud storage.</div></div>'));

    var bar = U.el('<div class="toolbar"></div>');
    var up = U.el('<button class="btn primary">⬆ Upload Document</button>');
    var file = U.el('<input type="file" style="display:none" accept="image/*,application/pdf,.doc,.docx,.xls,.xlsx">');
    up.onclick = function () { file.click(); };
    file.onchange = function (e) {
      var f = e.target.files[0]; if (!f) return;
      if (f.size > MAX_BYTES) { U.Toast.show("File too large (max 1.5 MB locally). Use cloud mode for big files.", "bad"); file.value = ""; return; }
      var reader = new FileReader();
      reader.onload = function () {
        var fields = [
          { f: "name", label: "Document name", type: "text", def: f.name, req: true },
          { f: "linkedTo", label: "Linked to (unit / parcel / party)", type: "text" },
          { f: "category", label: "Category", type: "select", options: ["Agreement", "Plan", "Legal", "7/12 Extract", "Site Photo", "Approval", "Invoice", "Other"], def: "Other" }
        ];
        var built = U.buildForm(fields, null, function (data) {
          data.fileType = f.type || "file"; data.size = f.size; data.dataUrl = reader.result; data.uploadedAt = Store.todayISO();
          Store.upsert("documents", data, "company"); U.Modal.close(); U.Toast.show("Document saved", "good"); renderDocuments(mount);
        }, "Save Document");
        U.Modal.open("Upload — " + f.name, built.form, built.foot);
      };
      reader.readAsDataURL(f); file.value = "";
    };
    var sp = U.el('<div style="margin-left:auto"></div>'); sp.appendChild(up); bar.appendChild(sp); bar.appendChild(file); mount.appendChild(bar);

    var docs = byCompany("documents");
    if (!docs.length) { mount.appendChild(U.el('<div class="empty-state"><div class="big">📂</div><div>No documents yet.</div></div>')); return; }
    var wrap = U.el('<div class="table-wrap"></div>');
    var table = U.el('<table class="data"></table>');
    table.appendChild(U.el('<thead><tr><th>Document</th><th>Category</th><th>Linked To</th><th class="num">Size</th><th>Uploaded</th><th class="num">Actions</th></tr></thead>'));
    var tb = U.el("<tbody></tbody>");
    docs.forEach(function (d) {
      var tr = U.el("<tr></tr>");
      tr.appendChild(U.el("<td>📄 " + U.esc(d.name) + "</td>"));
      tr.appendChild(U.el('<td><span class="badge muted">' + U.esc(d.category || "Other") + "</span></td>"));
      tr.appendChild(U.el("<td>" + U.esc(d.linkedTo || "—") + "</td>"));
      tr.appendChild(U.el('<td class="num">' + Math.round((d.size || 0) / 1024) + " KB</td>"));
      tr.appendChild(U.el("<td>" + U.fmtDate(d.uploadedAt) + "</td>"));
      var act = U.el('<td class="num"><div class="row-actions"></div></td>'); var box = act.querySelector(".row-actions");
      var dl = U.el('<a class="btn sm" download="' + U.esc(d.name) + '">Download</a>'); dl.href = d.dataUrl;
      var view = U.el('<button class="btn sm">View</button>'); view.onclick = function () { var w = window.open(); if (w) w.document.write('<iframe src="' + d.dataUrl + '" style="border:0;width:100%;height:100%"></iframe>'); };
      var edit = U.el('<button class="btn sm">✎ Edit</button>');
      edit.onclick = function () {
        var built = U.buildForm([
          { f: "name", label: "Document name", type: "text", req: true },
          { f: "linkedTo", label: "Linked to (unit / parcel / party)", type: "text" },
          { f: "category", label: "Category", type: "select", options: ["Agreement", "Plan", "Legal", "7/12 Extract", "Site Photo", "Approval", "Invoice", "Other"] }
        ], d, function (data) { data.id = d.id; Store.upsert("documents", data, "company"); U.Modal.close(); U.Toast.show("Document updated", "good"); renderDocuments(mount); }, "Update");
        U.Modal.open("Edit Document", built.form, built.foot);
      };
      var del = U.el('<button class="btn sm danger">×</button>'); del.onclick = function () { Store.remove("documents", d.id); renderDocuments(mount); };
      box.appendChild(view); box.appendChild(edit); box.appendChild(dl); box.appendChild(del); tr.appendChild(act);
      tb.appendChild(tr);
    });
    table.appendChild(tb); wrap.appendChild(table); mount.appendChild(wrap);
  }

  /* ============================ Locations Map ============================ */
  function mapsKey() { return ((Store.raw().meta.integrations || {}).maps || {}).embedKey || ""; }
  function gmapsSearch(q) { return "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(q); }
  function gmapsEmbed(q) { return "https://www.google.com/maps/embed/v1/place?key=" + encodeURIComponent(mapsKey()) + "&q=" + encodeURIComponent(q); }

  function renderLocations(mount) {
    mount.innerHTML = "";
    mount.appendChild(U.pageHead("Locations Map", "Your properties & projects on the map."));
    var key = mapsKey();
    if (!key) mount.appendChild(U.el('<div class="notice"><span class="ni">🗺️</span><div>“Open in Google Maps” works right now with no setup. Add a free <b>Maps Embed API</b> key in <a href="#" id="goMapSettings">Settings</a> to show maps inline here.</div></div>'));

    var items = [];
    byCompany("properties").forEach(function (p) { items.push({ name: p.name, loc: p.location || p.name, sub: p.surveyNo || "", type: "Property" }); });
    Store.listProjects().forEach(function (p) { items.push({ name: p.name, loc: p.location || p.name, sub: p.reraNo ? "RERA " + p.reraNo : "", type: "Project" }); });
    if (!items.length) { mount.appendChild(U.el('<div class="empty-state"><div class="big">📍</div><div>No properties or projects with a location yet.</div></div>')); var g0 = mount.querySelector("#goMapSettings"); if (g0) g0.onclick = function (e) { e.preventDefault(); App.route("settings"); }; return; }

    var grid = U.el('<div class="cards grid-2"></div>');
    items.forEach(function (it) {
      var q = it.loc;
      var card = U.el('<div class="card"></div>');
      card.appendChild(U.el('<div class="spread"><div><h3 style="margin:0">' + U.esc(it.name) + '</h3><div class="muted" style="font-size:12px">📍 ' + U.esc(it.loc) + (it.sub ? " • " + U.esc(it.sub) : "") + '</div></div><span class="badge ' + (it.type === "Property" ? "info" : "muted") + '">' + it.type + "</span></div>"));
      if (key) {
        var ifr = U.el('<iframe loading="lazy" style="width:100%;height:220px;border:0;border-radius:10px;margin-top:10px" referrerpolicy="no-referrer-when-downgrade"></iframe>');
        ifr.src = gmapsEmbed(q);
        card.appendChild(ifr);
      }
      var open = U.el('<a class="btn sm" target="_blank" rel="noopener" style="margin-top:10px">📍 Open in Google Maps</a>');
      open.href = gmapsSearch(q);
      card.appendChild(open);
      grid.appendChild(card);
    });
    mount.appendChild(grid);
    var g = mount.querySelector("#goMapSettings"); if (g) g.onclick = function (e) { e.preventDefault(); App.route("settings"); };
  }

  global.Extras = { renderCustomer360: renderCustomer360, renderBudget: renderBudget, renderLandDesk: renderLandDesk, renderDocuments: renderDocuments, renderLocations: renderLocations };
})(window);

</script>
  <script>
/* AtriaERP — Workflows:
 *  • New Booking wizard (lead → unit → pricing → payment plan → agreement)
 *  • Follow-up Calendar (all reminders across modules, grouped by urgency)
 *  • Rent Roll (escalation, renewals, rent collection)
 */
(function (global) {
  "use strict";
  var U = global.UI;

  function addDays(n) { var d = new Date(); d.setDate(d.getDate() + n); return d.toISOString().slice(0, 10); }

  /* ============================ Booking Wizard ============================ */
  var PLANS = {
    "Construction Linked": [
      { label: "On Booking", pct: 10, off: 0 }, { label: "On Agreement", pct: 20, off: 30 },
      { label: "On Plinth", pct: 15, off: 90 }, { label: "On Slabs", pct: 25, off: 180 },
      { label: "On Brickwork", pct: 10, off: 270 }, { label: "On Finishing", pct: 10, off: 330 },
      { label: "On Possession", pct: 10, off: 365 }
    ],
    "Down Payment": [
      { label: "On Booking", pct: 10, off: 0 }, { label: "Within 30 days", pct: 80, off: 30 }, { label: "On Possession", pct: 10, off: 365 }
    ],
    "Simple (20:80)": [
      { label: "On Booking", pct: 20, off: 0 }, { label: "Balance on Agreement", pct: 80, off: 30 }
    ]
  };

  function renderBooking(mount) {
    var pr = Store.currentProject();
    var st = { step: 1, leadId: "", customer: "", phone: "", email: "", unitId: "", discount: 0, otherCharges: 0, plan: "Construction Linked" };
    if (!pr) { mount.innerHTML = ""; mount.appendChild(U.pageHead("New Booking", "")); mount.appendChild(U.el('<div class="notice warn"><span class="ni">⚠️</span><div>Select a project first.</div></div>')); return; }

    function unit() { return Store.get("units", st.unitId); }
    function basePrice() { var u = unit(); return u ? Number(u.price) || 0 : 0; }
    function finalValue() { return Math.max(0, Math.round(basePrice() * (1 - (Number(st.discount) || 0) / 100) + (Number(st.otherCharges) || 0))); }

    function draw() {
      mount.innerHTML = "";
      mount.appendChild(U.pageHead("New Booking", "Book a unit end-to-end — customer, unit, price, payment plan & agreement."));
      var steps = ["Customer", "Unit", "Pricing", "Payment Plan", "Confirm"];
      var ind = U.el('<div class="seg" style="margin-bottom:16px"></div>');
      steps.forEach(function (s, i) { ind.appendChild(U.el('<button class="' + (i + 1 === st.step ? "active" : "") + '">' + (i + 1) + ". " + s + "</button>")); });
      mount.appendChild(ind);
      var card = U.el('<div class="card"></div>');
      mount.appendChild(card);
      [step1, step2, step3, step4, step5][st.step - 1](card);
      mount.appendChild(navButtons());
    }

    function navButtons() {
      var box = U.el('<div class="row-flex" style="margin-top:16px;justify-content:space-between"></div>');
      var back = U.el('<button class="btn">‹ Back</button>'); back.disabled = st.step === 1; back.onclick = function () { st.step--; draw(); };
      var next = U.el('<button class="btn primary">' + (st.step === 5 ? "✓ Confirm Booking" : "Next ›") + "</button>");
      next.onclick = function () {
        if (st.step === 1 && !st.customer) { U.Toast.show("Choose or enter a customer", "bad"); return; }
        if (st.step === 2 && !st.unitId) { U.Toast.show("Select a unit", "bad"); return; }
        if (st.step === 5) { confirmBooking(); return; }
        st.step++; draw();
      };
      box.appendChild(back); box.appendChild(next); return box;
    }

    function step1(card) {
      card.appendChild(U.el("<h3>Who is booking?</h3>"));
      var leads = Store.list("leads", { scope: "project" }).filter(function (l) { return ["Booked", "Lost"].indexOf(l.stage) < 0; });
      var sel = U.el('<select style="margin-bottom:12px"><option value="">— New customer (type below) —</option></select>');
      leads.forEach(function (l) { var o = U.el('<option value="' + l.id + '">' + U.esc(l.name) + " (" + U.esc(l.phone || "") + ")</option>"); if (l.id === st.leadId) o.selected = true; sel.appendChild(o); });
      var f = U.el('<div class="form-grid"></div>');
      var fn = U.el('<div class="field req"><label>Customer name</label><input id="bk_name" value="' + U.esc(st.customer) + '"></div>');
      var fp = U.el('<div class="field"><label>Phone</label><input id="bk_phone" value="' + U.esc(st.phone) + '"></div>');
      var fe = U.el('<div class="field"><label>Email</label><input id="bk_email" value="' + U.esc(st.email) + '"></div>');
      f.appendChild(fn); f.appendChild(fp); f.appendChild(fe);
      sel.onchange = function () { st.leadId = sel.value; var l = Store.get("leads", sel.value); if (l) { st.customer = l.name; st.phone = l.phone || ""; st.email = l.email || ""; } draw(); };
      card.appendChild(sel); card.appendChild(f);
      fn.querySelector("input").oninput = function (e) { st.customer = e.target.value; };
      fp.querySelector("input").oninput = function (e) { st.phone = e.target.value; };
      fe.querySelector("input").oninput = function (e) { st.email = e.target.value; };
    }

    function step2(card) {
      card.appendChild(U.el("<h3>Select a unit <span class='muted' style='font-weight:400;font-size:12px'>(available in " + U.esc(pr.name) + ")</span></h3>"));
      var avail = Store.list("units", { scope: "project" }).filter(function (u) { return u.status === "Available"; });
      if (!avail.length) { card.appendChild(U.el('<div class="muted">No available units in this project.</div>')); return; }
      var grid = U.el('<div class="cards grid-3"></div>');
      avail.forEach(function (u) {
        var c = U.el('<div class="card" style="cursor:pointer;border:2px solid ' + (u.id === st.unitId ? "var(--brand)" : "var(--line)") + '"><div class="spread"><b>' + U.esc(u.unitNo) + '</b><span class="badge good">' + U.esc(u.type) + '</span></div><div class="muted" style="font-size:12px;margin:6px 0">' + U.esc(u.tower || "") + " • " + (u.carpetArea || "—") + ' sqft • ' + U.esc(u.facing || "") + '</div><div style="font-weight:800">' + U.inrShort(u.price) + "</div></div>");
        c.onclick = function () { st.unitId = u.id; draw(); };
        grid.appendChild(c);
      });
      card.appendChild(grid);
    }

    function step3(card) {
      card.appendChild(U.el("<h3>Pricing</h3>"));
      var u = unit();
      card.appendChild(U.el('<div class="stat-line"><span>Base price (' + U.esc(u.unitNo) + ')</span><b>' + U.inr(basePrice()) + "</b></div>"));
      var f = U.el('<div class="form-grid" style="margin-top:12px"></div>');
      var fd = U.el('<div class="field"><label>Discount %</label><input type="number" id="bk_disc" value="' + (st.discount || 0) + '"></div>');
      var fo = U.el('<div class="field"><label>Other charges (parking, floor-rise) ₹</label><input type="number" id="bk_oth" value="' + (st.otherCharges || 0) + '"></div>');
      f.appendChild(fd); f.appendChild(fo); card.appendChild(f);
      var tot = U.el('<div class="stat-line" style="margin-top:12px;font-size:16px"><span><b>Final agreement value</b></span><b style="color:var(--brand)">' + U.inr(finalValue()) + "</b></div>");
      card.appendChild(tot);
      fd.querySelector("input").oninput = function (e) { st.discount = Number(e.target.value) || 0; tot.querySelector("b:last-child").textContent = U.inr(finalValue()); };
      fo.querySelector("input").oninput = function (e) { st.otherCharges = Number(e.target.value) || 0; tot.querySelector("b:last-child").textContent = U.inr(finalValue()); };
    }

    function step4(card) {
      card.appendChild(U.el("<h3>Payment plan</h3>"));
      var sel = U.el('<select style="margin-bottom:12px"></select>');
      Object.keys(PLANS).forEach(function (k) { var o = U.el("<option>" + k + "</option>"); if (k === st.plan) o.selected = true; sel.appendChild(o); });
      card.appendChild(sel);
      var host = U.el("<div></div>"); card.appendChild(host);
      function drawPlan() {
        host.innerHTML = "";
        var val = finalValue();
        var t = U.el('<table class="data" style="border:1px solid var(--line);border-radius:8px;overflow:hidden"></table>');
        t.appendChild(U.el('<thead><tr><th>Milestone</th><th class="num">%</th><th class="num">Amount</th><th>Due</th></tr></thead>'));
        var tb = U.el("<tbody></tbody>");
        PLANS[st.plan].forEach(function (m) {
          tb.appendChild(U.el('<tr><td>' + U.esc(m.label) + '</td><td class="num">' + m.pct + '%</td><td class="num">' + U.inr(Math.round(val * m.pct / 100)) + '</td><td>' + U.fmtDate(addDays(m.off)) + "</td></tr>"));
        });
        t.appendChild(tb); host.appendChild(t);
      }
      sel.onchange = function () { st.plan = sel.value; drawPlan(); };
      drawPlan();
    }

    function step5(card) {
      var u = unit(), val = finalValue();
      card.appendChild(U.el("<h3>Confirm booking</h3>"));
      [["Customer", st.customer + (st.phone ? " (" + st.phone + ")" : "")], ["Unit", u.unitNo + " — " + u.type + ", " + (u.tower || "")], ["Final value", U.inr(val)], ["Payment plan", st.plan + " (" + PLANS[st.plan].length + " milestones)"]]
        .forEach(function (p) { card.appendChild(U.el('<div class="stat-line"><span>' + p[0] + '</span><b>' + U.esc(String(p[1])) + "</b></div>")); });
      card.appendChild(U.el('<div class="notice" style="margin-top:14px"><span class="ni">ℹ️</span><div>Confirming will: mark unit <b>' + U.esc(u.unitNo) + '</b> as Booked, create a draft agreement, generate ' + PLANS[st.plan].length + ' payment demands, and update the lead.</div></div>'));
    }

    function confirmBooking() {
      var u = unit(), val = finalValue();
      u.status = "Booked"; Store.upsert("units", u, "project");
      if (st.leadId) { var l = Store.get("leads", st.leadId); if (l) { l.stage = "Booked"; Store.upsert("leads", l, "project"); } }
      var agNo = "ATR/AGR/" + new Date().getFullYear() + "/" + Math.floor(100 + Math.random() * 900);
      Store.upsert("agreements", { agreementNo: agNo, customer: st.customer, unit: u.unitNo, value: val, agreementDate: Store.todayISO(), registrationStatus: "Not Started" }, "project");
      PLANS[st.plan].forEach(function (m) {
        Store.upsert("payments", { customer: st.customer, unit: u.unitNo, milestone: m.label, amount: Math.round(val * m.pct / 100), dueDate: addDays(m.off), status: m.off === 0 ? "Due" : "Due", mode: "" }, "project");
      });
      U.Toast.show("Booking confirmed for " + u.unitNo + " 🎉", "good");
      App.route("customer360");
    }

    draw();
  }

  /* ============================ Follow-up Calendar ============================ */
  function collectEvents() {
    var ev = [];
    Store.list("leads", { scope: "project" }).forEach(function (l) { if (l.nextFollowUp && l.stage !== "Booked" && l.stage !== "Lost") ev.push({ d: l.nextFollowUp, type: "Lead", color: "#1f6feb", label: l.name + " — " + l.stage, route: "leads" }); });
    Store.list("payments", { scope: "project" }).forEach(function (p) { if (p.dueDate && p.status !== "Paid") ev.push({ d: p.dueDate, type: "Payment", color: "#16a34a", label: p.customer + " — " + U.inrShort(p.amount) + " (" + (p.milestone || "") + ")", route: "collections" }); });
    Store.list("schedule", { scope: "project" }).forEach(function (s) { if (s.end && s.status !== "Done") ev.push({ d: s.end, type: "Site Task", color: "#d97706", label: s.task + " — " + (s.contractor || ""), route: "schedule" }); });
    Store.list("liaisoning", { scope: "project" }).forEach(function (a) { if (a.nextFollowUp && a.status !== "Approved") ev.push({ d: a.nextFollowUp, type: "Liaison", color: "#7c3aed", label: a.approval + " — " + a.authority, route: "liaisoning" }); });
    (Store.raw().records.land || []).filter(function (l) { return l.companyId === Store.getContext().companyId; }).forEach(function (l) { if (l.reminderDate) ev.push({ d: l.reminderDate, type: "Land", color: "#0891b2", label: l.parcel + " — " + l.stage, route: "landdesk" }); });
    (Store.raw().records.rentals || []).filter(function (r) { return r.companyId === Store.getContext().companyId; }).forEach(function (r) { if (r.leaseEnd && r.status !== "Vacated") ev.push({ d: r.leaseEnd, type: "Lease", color: "#db2777", label: r.tenant + " — lease ends", route: "rentdesk" }); });
    return ev;
  }

  function renderCalendar(mount) {
    mount.innerHTML = "";
    mount.appendChild(U.pageHead("Follow-up Calendar", "Every upcoming reminder across CRM, payments, site, liaison, land & leases."));
    var ev = collectEvents();
    var groups = { Overdue: [], Today: [], "Next 7 days": [], Later: [] };
    ev.forEach(function (e) { var dd = U.daysFromNow(e.d); if (dd == null) return; if (dd < 0) groups.Overdue.push(e); else if (dd === 0) groups.Today.push(e); else if (dd <= 7) groups["Next 7 days"].push(e); else groups.Later.push(e); });
    Object.keys(groups).forEach(function (k) { groups[k].sort(function (a, b) { return a.d < b.d ? -1 : 1; }); });

    var kpis = U.el('<div class="cards grid-4"></div>');
    kpis.appendChild(U.kpiCard("Overdue", groups.Overdue.length, "need attention", "🔴"));
    kpis.appendChild(U.kpiCard("Today", groups.Today.length, "due today", "🟠"));
    kpis.appendChild(U.kpiCard("Next 7 days", groups["Next 7 days"].length, "this week", "🔵"));
    kpis.appendChild(U.kpiCard("Later", groups.Later.length, "upcoming", "⚪"));
    mount.appendChild(kpis);

    // type filter
    var types = {}; ev.forEach(function (e) { types[e.type] = 1; });
    var bar = U.el('<div class="toolbar" style="margin-top:16px"></div>');
    var sel = U.el('<select><option value="">All types</option></select>');
    Object.keys(types).forEach(function (t) { sel.appendChild(U.el("<option>" + t + "</option>")); });
    bar.appendChild(U.el('<div class="muted">Filter:</div>')); bar.appendChild(sel); mount.appendChild(bar);

    var host = U.el("<div></div>"); mount.appendChild(host);
    function drawGroups(filter) {
      host.innerHTML = "";
      var any = false;
      ["Overdue", "Today", "Next 7 days", "Later"].forEach(function (k) {
        var list = groups[k].filter(function (e) { return !filter || e.type === filter; });
        if (!list.length) return; any = true;
        var card = U.el('<div class="card" style="margin-top:14px"><div class="card-section-head"><h3>' + (k === "Overdue" ? "🔴 " : k === "Today" ? "🟠 " : "📅 ") + k + ' <span class="muted" style="font-weight:400;font-size:12px">(' + list.length + ')</span></h3></div></div>');
        var ul = U.el('<ul class="list-plain"></ul>');
        list.forEach(function (e) {
          var li = U.el('<li style="cursor:pointer"><span class="dotmark" style="background:' + e.color + '"></span><div style="flex:1"><div>' + U.esc(e.label) + ' <span class="badge muted">' + U.esc(e.type) + '</span></div><small class="muted">' + U.fmtDate(e.d) + "</small></div></li>");
          li.onclick = function () { App.route(e.route); };
          ul.appendChild(li);
        });
        card.appendChild(ul); host.appendChild(card);
      });
      if (!any) host.appendChild(U.el('<div class="empty-state"><div class="big">🗓️</div><div>No upcoming follow-ups.</div></div>'));
    }
    sel.onchange = function () { drawGroups(sel.value); };
    drawGroups("");
  }

  /* ============================ Rent Roll ============================ */
  function escalatedRent(r) {
    var base = Number(r.monthlyRent) || 0, esc = Number(r.escalation) || 0;
    if (!r.leaseStart || !esc) return base;
    var yrs = Math.floor((Date.now() - new Date(r.leaseStart).getTime()) / (365 * 86400000));
    return Math.round(base * Math.pow(1 + esc / 100, Math.max(0, yrs)));
  }

  function renderRentRoll(mount) {
    mount.innerHTML = "";
    mount.appendChild(U.pageHead("Rent Roll", "Leases with escalated rent, renewals & collection.  •  " + Store.currentCompany().name));
    var leases = (Store.raw().records.rentals || []).filter(function (r) { return r.companyId === Store.getContext().companyId; });
    if (!leases.length) { mount.appendChild(U.el('<div class="empty-state"><div class="big">🔑</div><div>No leases. Add them under Inventory & Property → Rental Management.</div></div>')); return; }

    var monthlyTotal = leases.filter(function (r) { return r.status !== "Vacated"; }).reduce(function (s, r) { return s + escalatedRent(r); }, 0);
    var depTotal = leases.reduce(function (s, r) { return s + (Number(r.deposit) || 0); }, 0);
    var expiring = leases.filter(function (r) { var dd = U.daysFromNow(r.leaseEnd); return dd != null && dd <= 90 && r.status !== "Vacated"; });

    var kpis = U.el('<div class="cards grid-3"></div>');
    kpis.appendChild(U.kpiCard("Monthly Rent Roll", U.inrShort(monthlyTotal), leases.filter(function (r) { return r.status !== "Vacated"; }).length + " active leases", "🔑"));
    kpis.appendChild(U.kpiCard("Deposits Held", U.inrShort(depTotal), "refundable", "🏦"));
    kpis.appendChild(U.kpiCard("Expiring ≤90d", expiring.length, "need renewal", "⏰"));
    mount.appendChild(kpis);
    if (expiring.length) mount.appendChild(U.el('<div class="notice warn"><span class="ni">⏰</span><div><b>Renewals due:</b> ' + expiring.map(function (r) { return U.esc(r.tenant) + " (" + U.fmtDate(r.leaseEnd) + ")"; }).join(" • ") + "</div></div>"));

    var wrap = U.el('<div class="table-wrap" style="margin-top:16px"></div>');
    var table = U.el('<table class="data"></table>');
    table.appendChild(U.el('<thead><tr><th>Tenant</th><th>Unit</th><th class="num">Base Rent</th><th class="num">Current Rent</th><th class="num">Deposit</th><th>Lease End</th><th>Status</th><th class="num">Collect</th></tr></thead>'));
    var tb = U.el("<tbody></tbody>");
    leases.forEach(function (r) {
      var cur = escalatedRent(r); var dd = U.daysFromNow(r.leaseEnd);
      var stCls = { Active: "good", "Notice Period": "warn", Vacated: "muted", Overdue: "bad" }[r.status] || "muted";
      var collected = (r.rentLog || []).length;
      var tr = U.el("<tr></tr>");
      tr.appendChild(U.el("<td><b>" + U.esc(r.tenant) + "</b></td>"));
      tr.appendChild(U.el("<td>" + U.esc(r.unit || "—") + "</td>"));
      tr.appendChild(U.el('<td class="num">' + U.inr(r.monthlyRent) + "</td>"));
      tr.appendChild(U.el('<td class="num"><b>' + U.inr(cur) + "</b></td>"));
      tr.appendChild(U.el('<td class="num">' + U.inr(r.deposit) + "</td>"));
      tr.appendChild(U.el("<td>" + U.fmtDate(r.leaseEnd) + (dd != null && dd <= 90 && dd >= 0 ? ' <span class="badge warn">' + dd + "d</span>" : "") + "</td>"));
      tr.appendChild(U.el('<td><span class="badge ' + stCls + '">' + U.esc(r.status || "—") + "</span></td>"));
      var act = U.el('<td class="num"><div class="row-actions"></div></td>'); var box = act.querySelector(".row-actions");
      var edit = U.el('<button class="btn sm">✎ Edit</button>');
      edit.onclick = function () {
        var built = U.buildForm(Schema.ENTITIES.rentals.fields, r, function (data) {
          data.id = r.id; Store.upsert("rentals", data, "company"); U.Modal.close(); U.Toast.show("Lease updated", "good"); renderRentRoll(mount);
        }, "Update Lease");
        U.Modal.open("Edit Lease — " + r.tenant, built.form, built.foot);
      };
      var btn = U.el('<button class="btn sm primary" title="' + collected + ' months collected">+ Rent</button>');
      btn.onclick = function () {

        Store.upsert("rentals", r, "company"); U.Toast.show("Rent " + U.inr(cur) + " recorded for " + r.tenant, "good"); renderRentRoll(mount);
      };

  }

  <script>
/* AtriaERP — Letters & Formats: template-driven letter / NOC generation
 *  • Templates with {{merge_fields}} (editable — paste your own drafts here)
 *  • Issue: pick template -> auto-fill from customer/company -> preview -> Print / Download / Issue
 *  • Issued letters are saved to records.letters (also shown in Customer 360)
 */
(function (global) {
  "use strict";
  var U = global.UI;
  function cid() { return Store.getContext().companyId; }
  function co() { return Store.currentCompany(); }
  function proj() { return Store.currentProject(); }

  /* ---------- default templates (replace with your real drafts) ---------- */
  function defaultTemplates() {
    return [
      { id: Store.uid("tpl"), companyId: cid(), name: "Bank NOC (Mortgage)", type: "Bank NOC",
        body:
"NO OBJECTION CERTIFICATE\n\n" +
"Ref: {{refNo}}                                              Date: {{date}}\n\n" +
"To,\nThe Branch Manager,\n{{bank}}\n\n" +
"Sub: No Objection for mortgage of Unit {{unit}}, {{project}}.\n\n" +
"Dear Sir/Madam,\n\n" +
"This is to certify that {{customer}} has booked Unit No. {{unit}} in our project “{{project}}” developed by {{company}}.\n\n" +
"We have NO OBJECTION to the said unit being mortgaged to {{bank}} as security for the housing loan sanctioned to the customer, subject to the terms of the registered agreement and clearance of all dues payable to us.\n\n" +
"This certificate is issued at the request of the customer for loan purposes.\n\n" +
"For {{company}}\n\n\nAuthorised Signatory" },

      { id: Store.uid("tpl"), companyId: cid(), name: "Demand Letter", type: "Demand Letter",
        body:
"DEMAND LETTER\n\n" +
"Ref: {{refNo}}                                              Date: {{date}}\n\n" +
"To,\n{{customer}}\nUnit {{unit}}, {{project}}\n\n" +
"Sub: Demand towards {{milestone}}.\n\n" +
"Dear {{customer}},\n\n" +
"With reference to your booking of Unit No. {{unit}} in {{project}}, we wish to inform you that the {{milestone}} stage has been reached. Accordingly, an amount of Rs. {{amount}}/- is now due and payable.\n\n" +
"You are requested to make the payment within 7 (seven) days of this letter, by NEFT/RTGS/cheque in favour of “{{company}}”.\n\n" +
"For {{company}}\n\n\nAuthorised Signatory" },

      { id: Store.uid("tpl"), companyId: cid(), name: "Fit-out Permission", type: "Fit-out Permission",
        body:
"FIT-OUT PERMISSION LETTER\n\n" +
"Ref: {{refNo}}                                              Date: {{date}}\n\n" +
"To,\n{{customer}}\nUnit {{unit}}, {{project}}\n\n" +
"Dear {{customer}},\n\n" +
"Permission is hereby granted to you to commence interior fit-out works in Unit No. {{unit}}, {{project}}, subject to the following:\n" +
"1. All works to be carried out within the unit only, without affecting the structure or common areas.\n" +
"2. Fit-out deposit of Rs. {{amount}}/- to be paid (refundable).\n" +
"3. Working hours and society rules to be strictly followed.\n\n" +
"For {{company}}\n\n\nAuthorised Signatory" },

      { id: Store.uid("tpl"), companyId: cid(), name: "Parking Allotment", type: "Parking Allotment",
        body:
"PARKING ALLOTMENT LETTER\n\n" +
"Ref: {{refNo}}                                              Date: {{date}}\n\n" +
"To,\n{{customer}}\nUnit {{unit}}, {{project}}\n\n" +
"Dear {{customer}},\n\n" +
"We are pleased to allot Parking Space No. {{parkingNo}} to you in respect of your Unit No. {{unit}} in {{project}}.\n\n" +
"This allotment is part of and subject to the terms of your agreement for sale.\n\n" +
"For {{company}}\n\n\nAuthorised Signatory" },

      { id: Store.uid("tpl"), companyId: cid(), name: "Offer of Possession", type: "Possession Letter",
        body:
"OFFER OF POSSESSION\n\n" +
"Ref: {{refNo}}                                              Date: {{date}}\n\n" +
"To,\n{{customer}}\nUnit {{unit}}, {{project}}\n\n" +
"Dear {{customer}},\n\n" +
"We are happy to inform you that Unit No. {{unit}} in {{project}} is ready, and the Occupation Certificate has been received. We hereby offer you possession of the said unit.\n\n" +
"You are requested to clear all outstanding dues and complete the formalities to take possession within 15 days of this letter.\n\n" +
"For {{company}}\n\n\nAuthorised Signatory" }
    ];
  }

  function templates() {
    var list = (Store.raw().records.lettertemplates || []).filter(function (t) { return t.companyId === cid(); });
    if (!list.length) { defaultTemplates().forEach(function (t) { Store.upsert("lettertemplates", t, "company"); }); list = (Store.raw().records.lettertemplates || []).filter(function (t) { return t.companyId === cid(); }); }
    return list;
  }

  /* ---------- merge logic ---------- */
  function fieldsIn(body) {
    var set = {}, m, re = /\{\{\s*(\w+)\s*\}\}/g;
    while ((m = re.exec(body))) set[m[1]] = 1;
    return Object.keys(set);
  }
  var AUTO = ["company", "companygstin", "project"];
  function autoValue(field) {
    var f = field.toLowerCase();
    if (f === "company") return co().name;
    if (f === "companygstin") return co().gstin || "";
    if (f === "project") return proj() ? proj().name : "";

  }
  function label(field) { return field.replace(/([A-Z])/g, " $1").replace(/^./, function (c) { return c.toUpperCase(); }); }

  function renderBody(body, values) {
    return body.replace(/\{\{\s*(\w+)\s*\}\}/g, function (_, f) {
      var v = values[f]; if (v == null || v === "") v = autoValue(f); return v == null ? "______" : v;

  function letterCSS() {

      ".sheet{background:#fff;max-width:780px;margin:24px auto;padding:54px 60px;box-shadow:0 2px 12px rgba(0,0,0,.15);min-height:1000px}" +
      ".lh{border-bottom:3px solid #1f6feb;padding-bottom:12px;margin-bottom:28px}" +
      ".lh h1{margin:0;font-size:26px;letter-spacing:.5px;color:#0f1729}" +
      ".lh .sub{font-size:12px;color:#555;margin-top:4px}" +
      ".content{white-space:pre-wrap;font-size:15px;line-height:1.7}" +

  function letterHTML(tpl, values) {

      (c.gstin ? "GSTIN: " + U.esc(c.gstin) + "  |  " : "") + U.esc([c.city, c.state].filter(Boolean).join(", ")) +

  function downloadLetter(tpl, values) {

  /* ---------- main view ---------- */
  function render(mount) {
